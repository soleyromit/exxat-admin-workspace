name: Deploy notification

on:
  push:
    branches: [dev, main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post Teams notification
        if: ${{ env.TEAMS_WEBHOOK_URL != '' }}
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          BRANCH="${{ github.ref_name }}"
          AUTHOR="${{ github.actor }}"
          MSG="${{ github.event.head_commit.message }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          URL="${{ github.server_url }}/${{ github.repository }}/commit/${SHA}"

          if [ "$BRANCH" = "main" ]; then
            COLOR="00C851"
            ENV_LABEL="PRODUCTION"
          else
            COLOR="FF8800"
            ENV_LABEL="DEV"
          fi

          curl -s -X POST "$TEAMS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"@type\": \"MessageCard\",
              \"@context\": \"http://schema.org/extensions\",
              \"themeColor\": \"${COLOR}\",
              \"summary\": \"${ENV_LABEL} deploy\",
              \"sections\": [{
                \"activityTitle\": \"${ENV_LABEL} deploy on \\\`${BRANCH}\\\` by ${AUTHOR}\",
                \"activityText\": \"${MSG}\",
                \"facts\": [{
                  \"name\": \"Commit\",
                  \"value\": \"[${SHORT_SHA}](${URL})\"
                }],
                \"markdown\": true
              }]
            }"
