name: WCAG Accessibility Check

# Runs against live Vercel deployments — no local build needed.
# Triggers: every push to dev/main (after Vercel deploys), and nightly.
#
# Required repository variables (Settings → Variables → Actions):
#   PCE_ADMIN_DEV_URL  — Vercel dev deployment URL for PCE admin
#   PCE_ADMIN_PROD_URL — Vercel prod deployment URL for PCE admin
#   EM_ADMIN_DEV_URL   — Vercel dev deployment URL for Exam Management admin
#   EM_ADMIN_PROD_URL  — Vercel prod deployment URL for Exam Management admin
#
# Required repository secrets:
#   TEAMS_WEBHOOK_URL  — Teams incoming webhook (already set for deploy-notify)
#
# Results: GitHub Actions step summary (visible in Actions tab) + Teams card.
# Exit: 1 if any critical or serious violations found (marks commit red).

on:
  push:
    branches: [dev, main]
    paths:
      - 'apps/pce/admin/**'
      - 'apps/exam-management/admin/**'
      - 'tools/visual-check/**'
  pull_request:
    paths:
      - 'apps/pce/admin/**'
      - 'apps/exam-management/admin/**'
      - 'tools/visual-check/**'
  schedule:
    # Nightly at 7am UTC — catches regressions from DS updates
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      product:
        description: 'Which product to check'
        required: false
        default: 'all'
        type: choice
        options: [all, pce-admin, em-admin]

jobs:
  # ── Detect which apps changed ────────────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      pce_changed: ${{ steps.changed.outputs.pce }}
      em_changed: ${{ steps.changed.outputs.em }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed apps
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "pce=true" >> $GITHUB_OUTPUT
            echo "em=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Use github.event.before for push events — more reliable than HEAD~1
          # which fails (exit 128) on the first push to a branch (no parent) or
          # on shallow clones where the base commit isn't fetched.
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          # Null SHA means this is the first push to a new branch — treat all as changed.
          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "pce=true" >> $GITHUB_OUTPUT
            echo "em=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          PCE=$(echo "$CHANGED" | grep -q "^apps/pce/admin" && echo "true" || echo "false")
          EM=$(echo "$CHANGED" | grep -q "^apps/exam-management/admin" && echo "true" || echo "false")
          TOOLS=$(echo "$CHANGED" | grep -q "^tools/visual-check" && echo "true" || echo "false")
          # tools change → recheck everything
          if [[ "$TOOLS" == "true" ]]; then PCE=true; EM=true; fi
          echo "pce=$PCE" >> $GITHUB_OUTPUT
          echo "em=$EM" >> $GITHUB_OUTPUT

  # ── PCE Admin WCAG check ─────────────────────────────────────────────────────
  wcag-pce:
    name: WCAG — PCE Admin
    needs: detect
    if: needs.detect.outputs.pce_changed == 'true'
    runs-on: ubuntu-latest
    env:
      # push/schedule only; PR previews are resolved at runtime below.
      TARGET_URL: >-
        ${{ github.ref_name == 'main' && vars.PCE_ADMIN_PROD_URL || vars.PCE_ADMIN_DEV_URL }}
      VISUAL_CHECK_OUT_DIR: /tmp/visual-check/pce
      WCAG_PRODUCT: pce-admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install visual-check + Playwright
        run: |
          cd tools/visual-check
          npm install
          npx playwright install chromium --with-deps

      # Give Vercel ~90s to finish deploying before we check
      - name: Wait for Vercel deployment
        if: github.event_name == 'push'
        run: sleep 90

      # Resolve the preview URL from Vercel's OWN GitHub deployment rather than
      # guessing the hostname. The guess was broken three ways at once:
      #   1. WRONG PROJECT (PCE) — it targeted `exxat-pce-admin-tau`, which serves 404
      #      on every route. `exxat-pce-admin` is the project that actually serves PCE.
      #   2. DNS — `exxat-pce-admin-tau-git-<branch>-soleyromits-projects` is 67 chars
      #      even for a short branch, and the DNS label limit is 63, so it cannot
      #      resolve. `exxat-exam-management-admin-git-…` is 75, leaving room for a
      #      10-character branch name.
      #   3. RACE — a fixed `sleep 90` is a coin flip against Vercel.
      # Net effect: this job reported PASS while EVERY scan step was SKIPPED, on every
      # PR. A PCE route (/moderation) returned 500 the whole time and no gate saw it —
      # even though /moderation is in the scan list. A gate that cannot fail is worse
      # than no gate: it is where a real failure hides.
      # `environment_url` is what Vercel actually deployed. No guess, no race.
      - name: Resolve preview URL from Vercel's deployment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          WANT_ENV: 'Preview – exxat-pce-admin'
        run: |
          # Resolve the newest commit on this PR that Vercel actually deployed for
          # WANT_ENV, then take that deployment's environment_url.
          #
          # Why walk back instead of just using the head SHA: a build skipped by the
          # Ignored Build Step creates NO GitHub deployment at all (verified — on a
          # .github-only push, 6 of 7 projects skipped and only the one that built had
          # a deployment object). The preview alias still serves the last real build,
          # so that build is exactly what a reviewer sees and exactly what we must scan.
          # Head-SHA-only lookup would go blind precisely when a build is skipped.
          resolve_url() {  # $1 = sha -> echoes url, or nothing
            local id
            id=$(gh api "repos/$GITHUB_REPOSITORY/deployments?sha=$1&per_page=100" \
                  --jq '[.[]|select(.environment==env.WANT_ENV)][0].id // empty' 2>/dev/null || true)
            [ -z "$id" ] && return 0
            gh api "repos/$GITHUB_REPOSITORY/deployments/$id/statuses" \
              --jq '[.[]|select(.state=="success")][0].environment_url // empty' 2>/dev/null || true
          }

          # Give the head SHA a chance first — it may still be building.
          for i in $(seq 1 24); do
            URL=$(resolve_url "$SHA")
            if [ -n "$URL" ]; then
              echo "TARGET_URL=$URL" >> $GITHUB_ENV
              echo "Resolved '$WANT_ENV' at head $SHA -> $URL"
              exit 0
            fi
            ID=$(gh api "repos/$GITHUB_REPOSITORY/deployments?sha=$SHA&per_page=100" \
                  --jq '[.[]|select(.environment==env.WANT_ENV)][0].id // empty' 2>/dev/null || true)
            if [ -n "$ID" ]; then
              STATE=$(gh api "repos/$GITHUB_REPOSITORY/deployments/$ID/statuses" \
                      --jq '[.[]][0].state // "none"' 2>/dev/null || echo none)
              case "$STATE" in failure|error)
                echo "::warning::'$WANT_ENV' deployment $STATE at head — skipping."
                echo "TARGET_URL=" >> $GITHUB_ENV; exit 0 ;;
              esac
              sleep 15; continue
            fi
            # No deployment object for the head SHA after a grace period => it was
            # skipped by the Ignored Build Step. Fall back to older commits.
            [ "$i" -ge 4 ] && break
            sleep 15
          done

          echo "Head SHA has no deployment for '$WANT_ENV' (build skipped); walking back."
          for S in $(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/commits?per_page=100" \
                      --jq '[.[].sha]|reverse|.[]' 2>/dev/null || true); do
            URL=$(resolve_url "$S")
            if [ -n "$URL" ]; then
              echo "TARGET_URL=$URL" >> $GITHUB_ENV
              echo "Resolved '$WANT_ENV' at $S -> $URL (head build was skipped)"
              exit 0
            fi
          done
          echo "::warning::No deployment found for '$WANT_ENV' on this PR — skipping WCAG."
          echo "TARGET_URL=" >> $GITHUB_ENV

      - name: Verify target URL is reachable
        id: verify
        run: |
          echo "Checking $TARGET_URL ..."
          # Vercel truncates+hashes branch aliases longer than the 63-char DNS
          # label limit, so the guessed hostname below cannot resolve. Detect that
          # up front rather than reporting it as an opaque curl failure.
          HOST=${TARGET_URL#*://}; LABEL=${HOST%%.*}
          if [ ${#LABEL} -gt 63 ]; then
            echo "url_ok=false" >> $GITHUB_OUTPUT
            echo "::warning::Preview hostname label is ${#LABEL} chars (DNS limit 63) for branch '${{ github.head_ref }}'; Vercel's real alias is truncated and cannot be guessed. Skipping WCAG check."
            exit 0
          fi
          # Follow redirects (-L) to get the final HTTP status, so 307→200 passes.
          # A 307 without -L means the deployment is behind auth or not yet live.
          # The `|| STATUS="000"` guard is load-bearing: this step runs under `bash -e`,
          # so a curl transport failure (DNS/timeout) aborts the step before the
          # url_ok=false branch below can run, turning an intended skip into a hard failure.
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$TARGET_URL" --max-time 20) || STATUS="000"
          if [[ "$STATUS" == "200" ]]; then
            echo "url_ok=true" >> $GITHUB_OUTPUT
            echo "URL reachable (HTTP $STATUS)"
          else
            echo "url_ok=false" >> $GITHUB_OUTPUT
            echo "::warning::Target URL returned HTTP $STATUS after following redirects — skipping WCAG check"
          fi

      - name: Run static WCAG scan (all routes, default state)
        if: steps.verify.outputs.url_ok == 'true'
        env:
          BASE_URL: ${{ env.TARGET_URL }}
          VISUAL_CHECK_OUT_DIR: ${{ env.VISUAL_CHECK_OUT_DIR }}
        run: |
          mkdir -p $VISUAL_CHECK_OUT_DIR
          node tools/visual-check/run.mjs 2>&1

      - name: Run interaction WCAG scan (12 states per route)
        if: steps.verify.outputs.url_ok == 'true'
        env:
          BASE_URL: ${{ env.TARGET_URL }}
          VISUAL_CHECK_OUT_DIR: ${{ env.VISUAL_CHECK_OUT_DIR }}
        run: |
          node tools/visual-check/interactions.mjs 2>&1 || true

      - name: Generate markdown report
        id: report
        if: steps.verify.outputs.url_ok == 'true'
        run: |
          node tools/visual-check/summarize.mjs \
            --dir $VISUAL_CHECK_OUT_DIR \
            --product pce-admin \
            >> $GITHUB_STEP_SUMMARY || true

          CRITICAL=$(node tools/visual-check/summarize.mjs \
            --dir $VISUAL_CHECK_OUT_DIR --product pce-admin --count-critical 2>/dev/null || echo "0")
          echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT

      - name: Post Teams card
        if: always()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then exit 0; fi
          CARD=$(node tools/visual-check/summarize.mjs \
            --dir $VISUAL_CHECK_OUT_DIR --product pce-admin --teams-card 2>/dev/null \
            || echo '{"@type":"MessageCard","summary":"WCAG check skipped","sections":[]}')
          curl -s -X POST "$TEAMS_WEBHOOK_URL" -H "Content-Type: application/json" -d "$CARD" || true

      - name: Upload screenshots + axe JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wcag-pce-admin-${{ github.sha }}
          path: /tmp/visual-check/pce/**
          retention-days: 14

      - name: Fail on critical/serious violations
        if: steps.verify.outputs.url_ok == 'true' && steps.report.outputs.critical_count > 0
        run: |
          echo "::error::${{ steps.report.outputs.critical_count }} critical/serious WCAG violations found in PCE Admin. See step summary and artifacts."
          exit 1

  # ── Exam Management Admin WCAG check ─────────────────────────────────────────
  wcag-em:
    name: WCAG — Exam Management Admin
    needs: detect
    if: needs.detect.outputs.em_changed == 'true'
    runs-on: ubuntu-latest
    env:
      # push/schedule only; PR previews are resolved at runtime below.
      TARGET_URL: >-
        ${{ github.ref_name == 'main' && vars.EM_ADMIN_PROD_URL || vars.EM_ADMIN_DEV_URL }}
      VISUAL_CHECK_OUT_DIR: /tmp/visual-check/em
      WCAG_PRODUCT: em-admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install visual-check + Playwright
        run: |
          cd tools/visual-check
          npm install
          npx playwright install chromium --with-deps

      - name: Wait for Vercel deployment
        if: github.event_name == 'push'
        run: sleep 90

      # Resolve the preview URL from Vercel's OWN GitHub deployment rather than
      # guessing the hostname. The guess was broken three ways at once:
      #   1. WRONG PROJECT (PCE) — it targeted `exxat-pce-admin-tau`, which serves 404
      #      on every route. `exxat-pce-admin` is the project that actually serves PCE.
      #   2. DNS — `exxat-pce-admin-tau-git-<branch>-soleyromits-projects` is 67 chars
      #      even for a short branch, and the DNS label limit is 63, so it cannot
      #      resolve. `exxat-exam-management-admin-git-…` is 75, leaving room for a
      #      10-character branch name.
      #   3. RACE — a fixed `sleep 90` is a coin flip against Vercel.
      # Net effect: this job reported PASS while EVERY scan step was SKIPPED, on every
      # PR. A PCE route (/moderation) returned 500 the whole time and no gate saw it —
      # even though /moderation is in the scan list. A gate that cannot fail is worse
      # than no gate: it is where a real failure hides.
      # `environment_url` is what Vercel actually deployed. No guess, no race.
      - name: Resolve preview URL from Vercel's deployment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          WANT_ENV: 'Preview – exxat-exam-management-admin'
        run: |
          # Resolve the newest commit on this PR that Vercel actually deployed for
          # WANT_ENV, then take that deployment's environment_url.
          #
          # Why walk back instead of just using the head SHA: a build skipped by the
          # Ignored Build Step creates NO GitHub deployment at all (verified — on a
          # .github-only push, 6 of 7 projects skipped and only the one that built had
          # a deployment object). The preview alias still serves the last real build,
          # so that build is exactly what a reviewer sees and exactly what we must scan.
          # Head-SHA-only lookup would go blind precisely when a build is skipped.
          resolve_url() {  # $1 = sha -> echoes url, or nothing
            local id
            id=$(gh api "repos/$GITHUB_REPOSITORY/deployments?sha=$1&per_page=100" \
                  --jq '[.[]|select(.environment==env.WANT_ENV)][0].id // empty' 2>/dev/null || true)
            [ -z "$id" ] && return 0
            gh api "repos/$GITHUB_REPOSITORY/deployments/$id/statuses" \
              --jq '[.[]|select(.state=="success")][0].environment_url // empty' 2>/dev/null || true
          }

          # Give the head SHA a chance first — it may still be building.
          for i in $(seq 1 24); do
            URL=$(resolve_url "$SHA")
            if [ -n "$URL" ]; then
              echo "TARGET_URL=$URL" >> $GITHUB_ENV
              echo "Resolved '$WANT_ENV' at head $SHA -> $URL"
              exit 0
            fi
            ID=$(gh api "repos/$GITHUB_REPOSITORY/deployments?sha=$SHA&per_page=100" \
                  --jq '[.[]|select(.environment==env.WANT_ENV)][0].id // empty' 2>/dev/null || true)
            if [ -n "$ID" ]; then
              STATE=$(gh api "repos/$GITHUB_REPOSITORY/deployments/$ID/statuses" \
                      --jq '[.[]][0].state // "none"' 2>/dev/null || echo none)
              case "$STATE" in failure|error)
                echo "::warning::'$WANT_ENV' deployment $STATE at head — skipping."
                echo "TARGET_URL=" >> $GITHUB_ENV; exit 0 ;;
              esac
              sleep 15; continue
            fi
            # No deployment object for the head SHA after a grace period => it was
            # skipped by the Ignored Build Step. Fall back to older commits.
