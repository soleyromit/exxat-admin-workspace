name: WCAG Accessibility Check

# Runs against live Vercel deployments — no local build needed.
# Triggers: every push to dev/main (after Vercel deploys), and nightly.
#
# Required repository variables (Settings → Variables → Actions):
#   PCE_ADMIN_DEV_URL  — Vercel dev deployment URL for PCE admin
#   PCE_ADMIN_PROD_URL — Vercel prod deployment URL for PCE admin
#   EM_ADMIN_DEV_URL   — Vercel dev deployment URL for Exam Management admin
#   EM_ADMIN_PROD_URL  — Vercel prod deployment URL for Exam Management admin
#
# Required repository secrets:
#   TEAMS_WEBHOOK_URL  — Teams incoming webhook (already set for deploy-notify)
#
# Results: GitHub Actions step summary (visible in Actions tab) + Teams card.
# Exit: 1 if any critical or serious violations found (marks commit red).

on:
  push:
    branches: [dev, main]
    paths:
      - 'apps/pce/admin/**'
      - 'apps/exam-management/admin/**'
      - 'tools/visual-check/**'
  pull_request:
    paths:
      - 'apps/pce/admin/**'
      - 'apps/exam-management/admin/**'
      - 'tools/visual-check/**'
  schedule:
    # Nightly at 7am UTC — catches regressions from DS updates
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      product:
        description: 'Which product to check'
        required: false
        default: 'all'
        type: choice
        options: [all, pce-admin, em-admin]

jobs:
  # ── Detect which apps changed ────────────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      pce_changed: ${{ steps.changed.outputs.pce }}
      em_changed: ${{ steps.changed.outputs.em }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed apps
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "pce=true" >> $GITHUB_OUTPUT
            echo "em=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Use github.event.before for push events — more reliable than HEAD~1
          # which fails (exit 128) on the first push to a branch (no parent) or
          # on shallow clones where the base commit isn't fetched.
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          # Null SHA means this is the first push to a new branch — treat all as changed.
          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "pce=true" >> $GITHUB_OUTPUT
            echo "em=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          PCE=$(echo "$CHANGED" | grep -q "^apps/pce/admin" && echo "true" || echo "false")
          EM=$(echo "$CHANGED" | grep -q "^apps/exam-management/admin" && echo "true" || echo "false")
          TOOLS=$(echo "$CHANGED" | grep -q "^tools/visual-check" && echo "true" || echo "false")
          # tools change → recheck everything
          if [[ "$TOOLS" == "true" ]]; then PCE=true; EM=true; fi
          echo "pce=$PCE" >> $GITHUB_OUTPUT
          echo "em=$EM" >> $GITHUB_OUTPUT

  # ── PCE Admin WCAG check ─────────────────────────────────────────────────────
  wcag-pce:
    name: WCAG — PCE Admin
    needs: detect
    if: needs.detect.outputs.pce_changed == 'true'
    runs-on: ubuntu-latest
    env:
      TARGET_URL: >-
        ${{
          github.event_name == 'pull_request'
          && format('https://exxat-pce-admin-tau-git-{0}-soleyromits-projects.vercel.app',
               github.head_ref)
          || (github.ref_name == 'main' && vars.PCE_ADMIN_PROD_URL || vars.PCE_ADMIN_DEV_URL)
        }}
      VISUAL_CHECK_OUT_DIR: /tmp/visual-check/pce
      WCAG_PRODUCT: pce-admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install visual-check + Playwright
        run: |
          cd tools/visual-check
          npm install
          npx playwright install chromium --with-deps

      # Give Vercel ~90s to finish deploying before we check
      - name: Wait for Vercel deployment
        if: github.event_name == 'push'
        run: sleep 90

      - name: Verify target URL is reachable
        id: verify
        run: |
          echo "Checking $TARGET_URL ..."
          # Follow redirects (-L) to get the final HTTP status, so 307→200 passes.
          # A 307 without -L means the deployment is behind auth or not yet live.
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$TARGET_URL" --max-time 20)
          if [[ "$STATUS" == "200" ]]; then
            echo "url_ok=true" >> $GITHUB_OUTPUT
            echo "URL reachable (HTTP $STATUS)"
          else
            echo "url_ok=false" >> $GITHUB_OUTPUT
            echo "::warning::Target URL returned HTTP $STATUS after following redirects — skipping WCAG check"
          fi

      - name: Run static WCAG scan (all routes, default state)
        if: steps.verify.outputs.url_ok == 'true'
        env:
          BASE_URL: ${{ env.TARGET_URL }}
          VISUAL_CHECK_OUT_DIR: ${{ env.VISUAL_CHECK_OUT_DIR }}
        run: |
          mkdir -p $VISUAL_CHECK_OUT_DIR
          node tools/visual-check/run.mjs 2>&1

      - name: Run interaction WCAG scan (12 states per route)
        if: steps.verify.outputs.url_ok == 'true'
        env:
          BASE_URL: ${{ env.TARGET_URL }}
          VISUAL_CHECK_OUT_DIR: ${{ env.VISUAL_CHECK_OUT_DIR }}
        run: |
          node tools/visual-check/interactions.mjs 2>&1 || true

      - name: Generate markdown report
        id: report
        if: steps.verify.outputs.url_ok == 'true'
        run: |
          node tools/visual-check/summarize.mjs \
            --dir $VISUAL_CHECK_OUT_DIR \
            --product pce-admin \
            >> $GITHUB_STEP_SUMMARY || true

          CRITICAL=$(node tools/visual-check/summarize.mjs \
            --dir $VISUAL_CHECK_OUT_DIR --product pce-admin --count-critical 2>/dev/null || echo "0")
          echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT

      - name: Post Teams card
        if: always()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then exit 0; fi
          CARD=$(node tools/visual-check/summarize.mjs \
            --dir $VISUAL_CHECK_OUT_DIR --product pce-admin --teams-card 2>/dev/null \
            || echo '{"@type":"MessageCard","summary":"WCAG check skipped","sections":[]}')
          curl -s -X POST "$TEAMS_WEBHOOK_URL" -H "Content-Type: application/json" -d "$CARD" || true

      - name: Upload screenshots + axe JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wcag-pce-admin-${{ github.sha }}
          path: /tmp/visual-check/pce/**
          retention-days: 14

      - name: Fail on critical/serious violations
        if: steps.verify.outputs.url_ok == 'true' && steps.report.outputs.critical_count > 0
        run: |
          echo "::error::${{ steps.report.outputs.critical_count }} critical/serious WCAG violations found in PCE Admin. See step summary and artifacts."
          exit 1

  # ── Exam Management Admin WCAG check ─────────────────────────────────────────
  wcag-em:
    name: WCAG — Exam Management Admin
    needs: detect
    if: needs.detect.outputs.em_changed == 'true'
    runs-on: ubuntu-latest
    env:
      TARGET_URL: >-
        ${{
          github.event_name == 'pull_request'
          && format('https://exxat-exam-management-admin-git-{0}-soleyromits-projects.vercel.app',
               github.head_ref)
          || (github.ref_name == 'main' && vars.EM_ADMIN_PROD_URL || vars.EM_ADMIN_DEV_URL)
        }}
      VISUAL_CHECK_OUT_DIR: /tmp/visual-check/em
      WCAG_PRODUCT: em-admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install visual-check + Playwright
        run: |
          cd tools/visual-check
          npm install
          npx playwright install chromium --with-deps

      - name: Wait for Vercel deployment
        if: github.event_name == 'push'
        run: sleep 90

      - name: Verify target URL is reachable
        id: verify
        run: |
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$TARGET_URL" --max-time 20)
          if [[ "$STATUS" == "200" ]]; then
            echo "url_ok=true" >> $GITHUB_OUTPUT
            echo "URL reachable (HTTP $STATUS)"
          else
            echo "url_ok=false" >> $GITHUB_OUTPUT
            echo "::warning::Target URL returned HTTP $STATUS after following redirects — skipping WCAG check"
          fi

      - name: Run static WCAG scan
        if: steps.verify.outputs.url_ok == 'true'
        env:
          BASE_URL: ${{ env.TARGET_URL }}
          VISUAL_CHECK_OUT_DIR: ${{ env.VISUAL_CHECK_OUT_DIR }}
        run: |
          mkdir -p $VISUAL_CHECK_OUT_DIR
          node tools/visual-check/run.mjs /students /faculty /courses /terms /question-bank 2>&1

      - name: Run interaction WCAG scan
        if: steps.verify.outputs.url_ok == 'true'
        env:
          BASE_URL: ${{ env.TARGET_URL }}
          VISUAL_CHECK_OUT_DIR: ${{ env.VISUAL_CHECK_OUT_DIR }}
        run: |
          node tools/visual-check/interactions.mjs /students /faculty /courses 2>&1 || true

      - name: Generate markdown report
        id: report
        if: steps.verify.outputs.url_ok == 'true'
        run: |
          node tools/visual-check/summarize.mjs \
            --dir $VISUAL_CHECK_OUT_DIR \
            --product em-admin \
            >> $GITHUB_STEP_SUMMARY || true

          CRITICAL=$(node tools/visual-check/summarize.mjs \
            --dir $VISUAL_CHECK_OUT_DIR --product em-admin --count-critical 2>/dev/null || echo "0")
          echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT

      - name: Post Teams card
        if: always()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then exit 0; fi
          CARD=$(node tools/visual-check/summarize.mjs \
            --dir $VISUAL_CHECK_OUT_DIR --product em-admin --teams-card 2>/dev/null \
            || echo '{"@type":"MessageCard","summary":"WCAG check skipped","sections":[]}')
          curl -s -X POST "$TEAMS_WEBHOOK_URL" -H "Content-Type: application/json" -d "$CARD" || true

      - name: Upload screenshots + axe JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wcag-em-admin-${{ github.sha }}
          path: /tmp/visual-check/em/**
          retention-days: 14

      - name: Fail on critical/serious violations
        if: steps.verify.outputs.url_ok == 'true' && steps.report.outputs.critical_count > 0
        run: |
          echo "::error::${{ steps.report.outputs.critical_count }} critical/serious WCAG violations found in Exam Management Admin. See step summary and artifacts."
          exit 1
