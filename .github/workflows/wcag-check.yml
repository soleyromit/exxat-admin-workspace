          for S in $(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/commits?per_page=100" \
                      --jq '[.[].sha]|reverse|.[]' 2>/dev/null || true); do
            URL=$(resolve_url "$S")
            if [ -n "$URL" ]; then
              echo "TARGET_URL=$URL" >> $GITHUB_ENV
              echo "Resolved '$WANT_ENV' at $S -> $URL (head build was skipped)"
              exit 0
            fi
          done
          echo "::warning::No deployment found for '$WANT_ENV' on this PR — skipping WCAG."
          echo "TARGET_URL=" >> $GITHUB_ENV

      - name: Verify target URL is reachable
        id: verify
        run: |
          echo "Checking $TARGET_URL ..."
          # See the PCE job above for why the length guard and `|| STATUS="000"` are required.
          HOST=${TARGET_URL#*://}; LABEL=${HOST%%.*}
          if [ ${#LABEL} -gt 63 ]; then
            echo "url_ok=false" >> $GITHUB_OUTPUT
            echo "::warning::Preview hostname label is ${#LABEL} chars (DNS limit 63) for branch '${{ github.head_ref }}'; Vercel's real alias is truncated and cannot be guessed. Skipping WCAG check."
            exit 0
          fi
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$TARGET_URL" --max-time 20) || STATUS="000"
          if [[ "$STATUS" == "200" ]]; then
