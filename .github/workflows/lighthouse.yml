name: Lighthouse CWV + A11Y gates

on:
  pull_request:
    paths:
      - 'apps/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/lighthouse.yml'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          # Add per-app entries as products are scaffolded.
          # Format: "{path}|{port}|{lcp_ms}|{cls_max}|{a11y_min}"
          # a11y_min: minimum Lighthouse accessibility category score (0.0-1.0)
          - 'apps/exam-management/admin|3001|2500|0.10|0.90'
          # - 'apps/exam-management/student|3002|2500|0.10|0.90'
          # - 'apps/pce/admin|3005|2500|0.10|0.90'
          # - 'apps/pce/student|3006|2500|0.10|0.90'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # need the base ref to diff against for change detection

      - name: Parse matrix entry
        id: parse
        run: |
          IFS='|' read -r path port lcp cls a11y <<< "${{ matrix.app }}"
          echo "path=$path" >> $GITHUB_OUTPUT
          echo "port=$port" >> $GITHUB_OUTPUT
          echo "lcp=$lcp" >> $GITHUB_OUTPUT
          echo "cls=$cls" >> $GITHUB_OUTPUT
          echo "a11y=$a11y" >> $GITHUB_OUTPUT

      # Decide before setting up the toolchain. setup-node's `cache: pnpm` adds a
      # post-job step that saves the pnpm store; if Install is skipped that store
      # never exists and the post-step fails the whole job, so a skipped app would
      # still report red.
      - name: Skip if app missing or untouched
        id: check
        run: |
          APP="${{ steps.parse.outputs.path }}"
          if [ ! -f "$APP/package.json" ]; then
            echo "App not yet scaffolded; skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # The workflow triggers on any `apps/**` change, but each matrix entry
          # only builds its own app. Without this, a PR touching only PCE would
          # build (and be gated on) Exam Management.
          if git diff --quiet "origin/${{ github.base_ref }}...HEAD" -- "$APP"; then
            echo "No changes under $APP; skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Changes detected under $APP; running Lighthouse."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v3
        if: steps.check.outputs.skip != 'true'
        with:
          version: 9

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install
        if: steps.check.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build app
        if: steps.check.outputs.skip != 'true'
        run: |
          cd "${{ steps.parse.outputs.path }}"
          pnpm build

      - name: Start app
        if: steps.check.outputs.skip != 'true'
        run: |
          cd "${{ steps.parse.outputs.path }}"
          pnpm start &
          npx wait-on "http://localhost:${{ steps.parse.outputs.port }}" -t 60000

      - name: Run Lighthouse CI
        if: steps.check.outputs.skip != 'true'
        run: |
          npx -y @lhci/cli@0.13 collect \
            --url="http://localhost:${{ steps.parse.outputs.port }}" \
            --numberOfRuns=3
          npx -y @lhci/cli@0.13 assert \
            --assertions.largest-contentful-paint="[\"error\", {\"maxNumericValue\": ${{ steps.parse.outputs.lcp }}}]" \
            --assertions.cumulative-layout-shift="[\"error\", {\"maxNumericValue\": ${{ steps.parse.outputs.cls }}}]" \
            --assertions.interaction-to-next-paint="[\"warn\", {\"maxNumericValue\": 200}]" \
            --assertions.categories:accessibility="[\"error\", {\"minScore\": ${{ steps.parse.outputs.a11y }}}]"

      - name: Upload Lighthouse reports
        if: always() && steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ steps.parse.outputs.path }}-${{ github.run_id }}
          path: .lighthouseci/
