  /* Triggering this week (upcoming surveys opening within 7 days) */
  const upcomingHtml = upcoming.length ? upcoming.slice(0,5).map(c=>{
    const t = typeOf(c.typeId);
    return `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer" onclick="openSurveyDetail('${c.id}','coord')">

    return `<div style="display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer" onclick="openSurveyDetail('${c.id}','coord')">

      <div style="width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;background:${h.icon==='ok'?'var(--c-green-bg)':h.icon==='warn'?'var(--c-amber-bg)':'var(--destructive-bg)'};color:${h.icon==='ok'?'var(--c-green-fg)':h.icon==='warn'?'var(--c-amber-fg)':'var(--destructive-fg)'}"><i class="fa-light ${h.icon==='ok'?'fa-check':h.icon==='warn'?'fa-triangle-exclamation':'fa-xmark'}"></i></div>

  /* Recent activity: try to extract a course code from the message and link to detail */
  const activityHtml = state.activity.slice(0,6).map(a=>{
    const codeMatch = a.text.match(/\b((?:PHYS|CLIN|DIDX|LAB|SEM)\s?\d{3})\b/);

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Autopilot</div>
        <div class="page-subtitle">${termOf(state.termId).name} operational nerve center. Surveys are triggered automatically based on term end date. The decision admin is notified one week before each batch.</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-outline btn-sm" onclick="setView('wizard')"><i class="fa-light fa-wand-magic-sparkles"></i>Create surveys for next term</button>
        <button class="btn btn-outline btn-sm" onclick="syncLmsNow()"><i class="fa-light fa-rotate"></i>Sync LMS</button>
      </div>
    </div>
    ${hero}

    ${(() => {
      /* Build lifecycle funnel for THIS term */
      const all = COURSES.filter(c=>c.termId===state.termId);
      const tmplBound = all.filter(c=>templateForCourse(c)).length;
      const collectingN = all.filter(c=>c.surveyStatus==='live').length;
      const closedN = all.filter(c=>['pending-review','results-available'].includes(c.surveyStatus)).length;
      const releasedN = all.filter(c=>c.surveyStatus==='results-available').length;
      const responded = all.reduce((a,c)=>a+responseCount(c.id),0);
      const enrolled = all.reduce((a,c)=>a+c.enrolled,0);
      const overall = enrolled? Math.round(responded/enrolled*100):0;
      /* 14-day timeline items */
      const today = new Date('2026-05-06');
      const timelineItems = all.filter(c=>['scheduled','live'].includes(c.surveyStatus)).map(c=>{
        const term = termOf(c.termId);
        const open = new Date(addDaysIso(term.endDate, -14));
        const dayOffset = Math.max(0, Math.min(14, Math.ceil((open-today)/86400000)));
        const isOpen = c.surveyStatus==='live';
        return {courseId:c.id, code:c.code, dayOffset:isOpen?0:dayOffset, label:isOpen?`Collecting (${c.completion}%)`:'Opens', color: isOpen?'oklch(0.42 0.13 184)':'oklch(0.50 0.14 286.1)'};
      }).sort((a,b)=>a.dayOffset-b.dayOffset).slice(0,8);

      return `
      <div class="dash-grid" style="margin-bottom:18px">
        <div class="card full">
          <div class="card-head"><div><div class="card-title"><i class="fa-light fa-filter-circle-dollar"></i>Survey lifecycle for ${termOf(state.termId).name}</div><div class="card-sub">From wizard creation through results released. Clicks navigate to the relevant queue.</div></div></div>
          ${chartLifecycleFunnel([
            {label:'Configured', count:tmplBound, sub:'with template', color:'oklch(0.62 0.008 270)'},
            {label:'Open', count:collectingN, sub:'collecting', color:'oklch(0.42 0.13 184)'},
            {label:'Closed', count:closedN-releasedN, sub:'awaiting grades', color:'oklch(0.62 0.16 84)'},
            {label:'Released', count:releasedN, sub:'to faculty', color:'oklch(0.45 0.14 155)'},
          ])}
          <div style="display:flex;gap:14px;align-items:center;margin-top:8px;padding-top:12px;border-top:1px solid var(--border)">

              <div style="font-size:13px;font-weight:600">${responded} of ${enrolled} students responded program-wide</div>
              <div style="font-size:11px;color:var(--muted-fg);line-height:1.55;margin-top:4px">${overall>=65?'<i class="fa-light fa-circle-check" style="color:var(--c-green-fg);margin-right:4px"></i>Above ARC-PA 65% target.':'<i class="fa-light fa-triangle-exclamation" style="color:var(--c-amber-fg);margin-right:4px"></i>Below 65% target. Day 7 reminders firing automatically; Day 10 alerts will surface in System health.'}</div>
            </div>
          </div>

        <div class="card full">
          <div class="card-head"><div><div class="card-title"><i class="fa-light fa-calendar-days"></i>Next 14 days</div><div class="card-sub">When each survey opens. Click a marker to open per-survey detail.</div></div></div>
          ${chartTimeline14Days(timelineItems, {persona:'coord'})}
        </div>
      </div>
      `;
    })()}

    <div class="dash-grid">
      <div class="card card-flush">
        <div class="card-section" style="display:flex;align-items:center;justify-content:space-between">
          <div><div class="card-title"><i class="fa-light fa-rocket-launch"></i>Triggering this week</div><div class="card-sub">Surveys opening in the next 7 days. Disable any of them inline.</div></div>
        </div>
        ${upcomingHtml}
      </div>
      <div class="card card-flush">
        <div class="card-section"><div class="card-title"><i class="fa-light fa-inbox-in"></i>Currently collecting</div><div class="card-sub">Live response rates. Click for the per-survey detail view.</div></div>
        ${collectingHtml}
      </div>
      <div class="card">
        <div class="card-head"><div><div class="card-title"><i class="fa-light fa-stethoscope"></i>System health</div><div class="card-sub">Issues blocking autopilot.</div></div></div>
        ${healthHtml}
      </div>
      <div class="card">
        <div class="card-head"><div><div class="card-title"><i class="fa-light fa-clock-rotate-left"></i>Recent activity</div><div class="card-sub">Notifications and actions.</div></div></div>
        ${activityHtml}
      </div>
    </div>
  `;
}

function openTriggerPlanModal(){
  const term = termOf(state.termId);
  const list = COURSES.filter(c=>c.termId===state.termId).sort((a,b)=>a.code.localeCompare(b.code));
  const eligible = list.filter(c=>templateForCourse(c));
  const skipped = list.filter(c=>!templateForCourse(c));
  const rows = eligible.map(c=>{
    const t = typeOf(c.typeId);
    const tmpl = templateForCourse(c);
    const status = c.surveyStatus==='live'?'<span class="badge badge-success">Collecting</span>':c.surveyStatus==='results-available'?'<span class="badge badge-muted">Released</span>':c.surveyStatus==='pending-review'?'<span class="badge badge-warn">Awaiting grades</span>':'<span class="badge badge-info">Scheduled</span>';
    return `<tr><td><strong>${c.code}</strong><div style="font-size:11px;color:var(--muted-fg);margin-top:2px">${escapeHtml(c.name)}</div></td><td><span class="badge ${t.badge}">${t.name}</span></td><td>${escapeHtml(tmpl.name)} <span class="badge badge-version">v${tmpl.version}</span></td><td>${shortDate(addDaysIso(term.endDate,-14))}</td><td>${shortDate(addDaysIso(term.endDate,7))}</td><td>${status}</td></tr>`;
  }).join('');
  const skippedHtml = skipped.length ? `<div style="margin-top:18px"><div class="section-label">Skipped: no template bound</div><table class="mtbl">${skipped.map(c=>`<tr><td><strong>${c.code}</strong>: ${escapeHtml(c.name)}</td><td><span class="badge ${typeOf(c.typeId).badge}">${typeOf(c.typeId).name}</span></td></tr>`).join('')}</table><button class="btn btn-link" style="margin-top:8px" onclick="closeModal();setPersona('pd');state.pdView='setup';state.pdSetupTab='types';renderAll()">Open Setup → Course Types to fix</button></div>` : '';
  showModal({title:`${term.name} trigger plan`,size:'modal-xl',body:`<p style="font-size:13px;color:var(--muted-fg);margin-bottom:14px">${eligible.length} survey${eligible.length===1?'':'s'} scheduled. Anchored to term end <strong>${fmtDate(term.endDate)}</strong>: open 14 days before, close 7 days after.</p><table class="mtbl"><thead><tr><th>Course</th><th>Type</th><th>Template</th><th>Opens</th><th>Closes</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>${skippedHtml}`,actions:`<button class="btn btn-outline" onclick="closeModal()">Close</button>`});
}

function disableSurveyFromAutopilot(cid){
  const c = courseOf(cid);
  showModal({
    title:`Disable survey: ${c.code}`,
    body: `<p style="margin-bottom:12px">Skip the autopilot survey for <strong>${escapeHtml(c.name)}</strong> this term?</p><div style="background:var(--c-amber-bg);border:1px solid color-mix(in oklch, var(--c-amber) 25%, white);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--c-amber-fg)"><i class="fa-light fa-circle-info" style="margin-right:6px"></i>Students get no email. No record collected. Other ${c.code.split(' ')[0]} courses unaffected. Re-enable from this list any time.</div>`,
    actions: `<button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-amber" onclick="confirmDisableSurvey('${cid}')"><i class="fa-light fa-ban"></i>Disable Survey</button>`,
  });
}
function confirmDisableSurvey(cid){
  const c = courseOf(cid);
  c.disabled = true;
  state.activity.unshift({when:new Date().toISOString(),text:`Survey for <strong>${c.code}</strong> manually disabled by ${PERSONAS.coord.name}.`});
  closeModal(); renderAll();
  toast(`${c.code} disabled.`,'warning');
}

/* ── Per-survey Detail (full screen, accessible from any list) ──── */
function openSurveyDetail(cid, fromPersona){
  state.surveyDetailId = cid;
  state.surveyDetailFromPersona = fromPersona || state.persona;
  renderAll();
}
function closeSurveyDetail(){
  state.surveyDetailId = null;
  renderAll();
}
function renderSurveyDetail(){
  const c = courseOf(state.surveyDetailId);
  if(!c){ closeSurveyDetail(); return ''; }
  const term = termOf(c.termId);
  const t = typeOf(c.typeId);
  const tmpl = templateForCourse(c);
  const responded = responseCount(c.id);
  const data = buildResponseData(c);
  const themes = COURSE_THEMES[c.id] || (c.avg!==null?getThemes(c.id):[]);
  const reflection = REFLECTIONS.find(r=>r.courseId===c.id);
  const note = FEEDBACK_NOTES.find(n=>n.courseCode===c.code && n.termId===c.termId);
  const cqi = CQI_ACTIONS.find(a=>a.courseCode===c.code && a.termId===c.termId);

  const openIso = addDaysIso(term.endDate, -14);
  const closeIso = addDaysIso(term.endDate, 7);
  const todayIso = '2026-05-06';

  /* Lifecycle timeline */
  const events = [
    {when:openIso+' 09:00', label:'Survey created + opened', detail:`Invitation emailed to ${c.enrolled} students via anonymous magic-token link.`, icon:'fa-paper-plane', state:'done', emailKind:'invitation'},
    {when:addDaysIso(openIso,3)+' 09:00', label:'Day 3 reminder fired', detail:`Sent only to non-completers. ${Math.max(0,c.enrolled-Math.round(c.enrolled*Math.min(c.completion+25,75)/100))} students received it.`, icon:'fa-bell', state:c.surveyStatus==='scheduled'?'pending':'done', emailKind:'reminder3'},
    {when:addDaysIso(openIso,7)+' 09:00', label:'Day 7 reminder fired', detail:`References prior cohort feedback note. ${Math.max(0,c.enrolled-Math.round(c.enrolled*Math.min(c.completion+10,85)/100))} students received it.`, icon:'fa-bell', state:c.surveyStatus==='scheduled'||(todayIso<addDaysIso(openIso,7))?'pending':'done', emailKind:'reminder7'},
    ...(c.completion<50?[{when:addDaysIso(openIso,10)+' 09:00', label:'Day 10 alert', detail:`Completion at ${c.completion}% with survey still open. Coordinator notified.`, icon:'fa-triangle-exclamation', state:'done', alert:true}]:[]),
    {when:closeIso+' 17:00', label:'Survey closed', detail:`${responded} of ${c.enrolled} students responded (${c.completion}%).`, icon:'fa-lock', state:['pending-review','results-available'].includes(c.surveyStatus)?'done':'pending'},
    {when:addDaysIso(closeIso,2)+' 10:30', label:'Grades submitted to SIS', detail:'Grade-lock signal received. Faculty results unlocked.', icon:'fa-unlock', state:c.surveyStatus==='results-available'?'done':'pending'},
    ...(reflection?[{when:reflection.savedAt.slice(0,10)+' 14:00', label:'Faculty reflection saved', detail:`${escapeHtml(c.instructor)} completed the 3-question structured reflection.`, icon:'fa-pen-to-square', state:'done'}]:[]),
    ...(note?[{when:note.postedAt+' 14:00', label:'Next-cohort note posted', detail:`Will appear at the top of next ${c.code} survey.`, icon:'fa-comment-dots', state:'done'}]:[]),
    ...(cqi?[{when:cqi.createdAt+' 11:00', label:'CQI action created', detail:escapeHtml(cqi.action.slice(0,120))+'...', icon:'fa-clipboard-list-check', state:'done'}]:[]),
  ];

  /* Response trajectory: build a synthetic per-day completion curve */
  const days = 21;
  const trajectory = [];
  for(let d=0; d<=days; d++){
    const final = c.completion;
    const ratio = d/days;
    /* S-curve: slow start, fast middle, plateau */
    const t = ratio;
    const sCurve = 1/(1+Math.exp(-(t-0.5)*8));
    trajectory.push({day:d, pct: Math.min(final, Math.round(final*sCurve))});
  }
  const W=560, H=160, P=30;
  const xs = trajectory.map((_,i)=>P+i*((W-2*P)/(trajectory.length-1)));
  const ys = trajectory.map(d=>H-P - (d.pct/100)*(H-2*P));
  const pathD = xs.map((x,i)=>`${i===0?'M':'L'}${x},${ys[i]}`).join(' ');
  const targetY = H-P-(65/100)*(H-2*P);
  const trajectorySvg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:160px"><line x1="${P}" x2="${W-P}" y1="${targetY}" y2="${targetY}" stroke="oklch(0.62 0.16 84)" stroke-width="1" stroke-dasharray="4 4"/><text x="${W-P}" y="${targetY-4}" text-anchor="end" font-size="9" fill="oklch(0.42 0.15 68)">ARC-PA 65% target</text>${[0,25,50,75,100].map(p=>{const y=H-P-(p/100)*(H-2*P);return `<line x1="${P}" x2="${W-P}" y1="${y}" y2="${y}" stroke="oklch(0.93 0.003 270)" stroke-width="1"/><text x="${P-6}" y="${y+3}" text-anchor="end" font-size="9" fill="oklch(0.55 0.012 270)">${p}%</text>`}).join('')}<path d="${pathD}" fill="none" stroke="var(--brand-color)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="${pathD} L ${xs[xs.length-1]} ${H-P} L ${P} ${H-P} Z" fill="var(--brand-color)" opacity="0.08"/>${[3,7,10,14,21].map(d=>{const x=P+d*((W-2*P)/days);return `<line x1="${x}" x2="${x}" y1="${P}" y2="${H-P}" stroke="oklch(0.92 0.004 270)" stroke-width="1" stroke-dasharray="2 2"/><text x="${x}" y="${H-P+12}" text-anchor="middle" font-size="9" fill="oklch(0.55 0.012 270)">D${d}</text>`}).join('')}</svg>`;

  /* Per-question summary — stacked horizontal bar per question.
     Width of each segment = % of responses at that rating, so the
     visual mass tells you where the cohort sat without arithmetic.
     Survey average is shown as a thin marker line on the bar so each
     question reads as "above or below the survey baseline". */
  const surveyAvg = c.avg !== null ? c.avg : null;
  /* Rating segment palette: green→amber sequential gradient.
     Avoiding red per Aarti's preference — bottom rating reads as deep
     burnt-amber (hue ~50), not destructive red (hue ~25). */
  const ratingFill = {
    5: 'oklch(0.55 0.14 145)',  /* vibrant green */
    4: 'oklch(0.65 0.10 130)',  /* pale green     */
    3: 'oklch(0.70 0.10 95)',   /* warm yellow    */
    2: 'oklch(0.65 0.13 70)',   /* amber          */
    1: 'oklch(0.52 0.16 55)',   /* deep burnt amber (no red) */
  };
  const qLegend = `<div style="display:flex;align-items:center;gap:14px;font-size:10px;color:var(--muted-fg);padding:0 0 12px 0;border-bottom:1px solid var(--hairline-soft);margin-bottom:10px;flex-wrap:wrap">
    <span style="font-weight:600;text-transform:uppercase;letter-spacing:.06em">Distribution</span>
    ${[
      {s:5, label:'5 ★ (Strongly agree)'},
      {s:4, label:'4 ★'},
      {s:3, label:'3 ★ (Neutral)'},
      {s:2, label:'2 ★'},
      {s:1, label:'1 ★ (Strongly disagree)'},
    ].map(t=>`<span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${ratingFill[t.s]}"></span>${t.label}</span>`).join('')}
    ${surveyAvg!==null ? `<span style="margin-left:auto;display:inline-flex;align-items:center;gap:6px"><span style="display:inline-block;width:2px;height:12px;background:var(--foreground);border-radius:1px"></span>Survey average ${surveyAvg.toFixed(2)}</span>` : ''}
  </div>`;
  const qHtml = data ? qLegend + data.questions.map((q,i)=>{
    const total = q.dist.reduce((a,b)=>a+b,0);
    const segs = [5,4,3,2,1].map(s=>{
      const ct = q.dist[s-1];
      const pct = total ? (ct/total)*100 : 0;
      return {s, ct, pct, fill: ratingFill[s]};
    });
    /* Bar order is 5→1 left-to-right, so high score = leftmost.
       Map avg (1..5) onto bar position by inverting: avg=5 → 0%, avg=1 → 100% */
    const markerPct = surveyAvg !== null ? Math.max(0, Math.min(100, (1 - (surveyAvg-1)/4) * 100)) : null;
    const delta = surveyAvg !== null ? +(q.avg - surveyAvg).toFixed(2) : null;
    const verdict = q.avg >= 4.3 ? {col:'var(--c-green-fg)',  bg:'var(--c-green-bg)',  ic:'fa-thumbs-up',            lbl:'Strong'}
                  : q.avg >= 3.7 ? {col:'var(--brand-color)', bg:'var(--brand-tint)',  ic:'fa-circle-check',         lbl:'Acceptable'}
                  : q.avg >= 3.0 ? {col:'var(--c-amber-fg)',  bg:'var(--c-amber-bg)',  ic:'fa-triangle-exclamation', lbl:'Watch'}
                                 : {col:'oklch(0.42 0.16 55)', bg:'oklch(0.96 0.04 60)', ic:'fa-circle-exclamation',  lbl:'Below 3.0'};
    return `<div style="padding:14px 8px;border-bottom:1px solid var(--hairline-soft);cursor:pointer;transition:background var(--tr-fast);border-radius:var(--r-sm);margin:0 -8px" onmouseover="this.style.background='var(--muted)'" onmouseout="this.style.background='transparent'" onclick="openQuestionDrill('${c.id}',${i})">
      <div style="display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:9px">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;color:var(--foreground);line-height:1.5;font-weight:500">${escapeHtml(q.text)}</div>
          <div style="display:flex;gap:12px;font-size:11px;color:var(--muted-fg);margin-top:5px;align-items:center;flex-wrap:wrap">
            <span style="font-variant-numeric:tabular-nums">N = ${total}</span>
            ${delta!==null ? `<span style="display:inline-flex;align-items:center;gap:4px;color:${delta>0.1?'var(--c-green-fg)':delta<-0.1?'var(--c-amber-fg)':'var(--muted-fg)'};font-variant-numeric:tabular-nums"><i class="fa-light fa-${delta>0.1?'arrow-up':delta<-0.1?'arrow-down':'minus'}" style="font-size:9px"></i>${delta>0?'+':''}${delta.toFixed(2)} vs survey avg</span>` : ''}
            <span class="badge" style="background:${verdict.bg};color:${verdict.col};font-size:10px;font-weight:600;padding:1px 7px;border-radius:var(--r-pill);border:0"><i class="fa-light ${verdict.ic}" style="font-size:9px"></i>${verdict.lbl}</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:9px;flex-shrink:0">
          <div style="font-family:var(--font-heading);font-size:24px;font-weight:500;color:var(--foreground);line-height:1;font-variant-numeric:tabular-nums">${q.avg.toFixed(2)}</div>
          <i class="fa-light fa-chevron-right" style="color:var(--muted-fg);font-size:11px"></i>
        </div>
      </div>
      <div style="position:relative;height:24px;background:var(--muted);border-radius:var(--r-sm);overflow:hidden;display:flex;box-shadow:inset 0 0 0 1px var(--hairline-soft)">
        ${segs.map(seg=>`<div title="${seg.s} stars: ${seg.ct} of ${total} (${Math.round(seg.pct)}%)" style="width:${seg.pct}%;background:${seg.fill};display:flex;align-items:center;justify-content:center;color:white;font-size:10px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.02em;transition:filter var(--tr-fast)" onmouseover="this.style.filter='brightness(1.08)'" onmouseout="this.style.filter='none'">${seg.pct>=10?seg.ct:''}</div>`).join('')}
        ${markerPct!==null ? `<div style="position:absolute;top:-2px;bottom:-2px;left:calc(${markerPct}% - 1px);width:2px;background:var(--foreground);border-radius:1px;pointer-events:none" aria-label="Survey average marker"></div>` : ''}
      </div>
    </div>`;
  }).join('') : `<div style="padding:24px;text-align:center;color:var(--muted-fg);font-size:12px"><div style="font-size:24px;margin-bottom:8px;color:var(--border-strong)"><i class="fa-light fa-square-poll-vertical"></i></div>Per-question distribution unlocks after grades are submitted to the SIS. ${c.surveyStatus==='live'?'Survey is still open, '+responseCount(c.id)+' of '+c.enrolled+' responses in.':c.surveyStatus==='pending-review'?'Awaiting grade submission to release results.':'No data yet.'}</div>`;

  /* Action loop — single panel that connects student concerns to faculty
     reflection to next-cohort note to CQI action. Replaces the two
     disconnected "Themes" and "Loop closure" cards so the causal chain
     is visible at a glance. */
  const concerns = themes.filter(t=>t.sentiment!=='positive');
  const positives = themes.filter(t=>t.sentiment==='positive');
  const topConcern = concerns[0] || null;
  const stepStates = {
    themes:    themes.length ? 'done' : (c.avg!==null ? 'pending' : 'blocked'),
    reflect:   reflection ? 'done' : (c.surveyStatus==='results-available' ? 'next' : 'blocked'),
    note:      note ? 'done' : (reflection ? 'next' : 'blocked'),
    cqi:       cqi ? 'done' : (topConcern || (c.avg!==null && c.avg<3.7) ? 'next' : 'optional'),
  };
  const stateStyle = (s)=>{
    if(s==='done')    return {bg:'var(--c-green-fg)',          fg:'white',                ring:'var(--c-green-bg)',          dot:'fa-check'};
    if(s==='next')    return {bg:'var(--brand-color)',          fg:'white',                ring:'var(--brand-tint)',          dot:''};
    if(s==='pending') return {bg:'color-mix(in oklch, var(--c-amber) 80%, white)', fg:'var(--c-amber-fg)', ring:'var(--c-amber-bg)', dot:''};
    if(s==='blocked') return {bg:'var(--muted-2)',              fg:'var(--muted-fg)',      ring:'var(--muted)',                dot:'fa-lock'};
    return                   {bg:'var(--muted-2)',              fg:'var(--muted-fg)',      ring:'var(--muted)',                dot:''};
  };

  const stepCol = (n, key, title, icon, body)=>{
    const s = stateStyle(stepStates[key]);
    return `<div style="flex:1;min-width:170px;display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:32px;height:32px;border-radius:var(--r-pill);background:${s.bg};color:${s.fg};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;box-shadow:0 0 0 4px ${s.ring}">${s.dot?`<i class="fa-light ${s.dot}"></i>`:n}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-fg);line-height:1">Step ${n}</div>
          <div style="font-size:13px;font-weight:600;color:var(--foreground);margin-top:3px;display:flex;align-items:center;gap:6px"><i class="fa-light ${icon}" style="color:var(--brand-color);font-size:12px"></i>${title}</div>
        </div>
      </div>
      <div style="font-size:12px;line-height:1.55;color:var(--muted-fg);min-height:64px">${body}</div>
    </div>`;
  };

  const themesBody = themes.length
    ? `${concerns.length ? `<div style="margin-bottom:6px"><span class="badge badge-amber" style="font-size:9px"><i class="fa-light fa-circle-exclamation"></i>${concerns.length} concern${concerns.length>1?'s':''}</span>${positives.length?` <span class="badge badge-success" style="font-size:9px;margin-left:4px"><i class="fa-light fa-thumbs-up"></i>${positives.length} positive</span>`:''}</div>` : `<div style="margin-bottom:6px"><span class="badge badge-success" style="font-size:9px"><i class="fa-light fa-thumbs-up"></i>${positives.length} positive themes</span></div>`}
       ${themes.slice(0,2).map((t,ti)=>`<div onclick="event.stopPropagation();openThemeDrill('${c.id}',${ti})" style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:var(--r-sm);cursor:pointer;font-size:12px" onmouseover="this.style.background='var(--muted)'" onmouseout="this.style.background='transparent'"><span style="color:var(--foreground);font-weight:500">${t.sentiment==='positive'?'<i class="fa-light fa-thumbs-up" style="color:var(--c-green-fg);font-size:10px;margin-right:5px"></i>':'<i class="fa-light fa-triangle-exclamation" style="color:var(--c-amber-fg);font-size:10px;margin-right:5px"></i>'}${escapeHtml(t.name)}</span><span style="color:var(--muted-fg);font-size:10px;font-variant-numeric:tabular-nums">${t.mentions}</span></div>`).join('')}`
    : (c.avg!==null
        ? `<span style="font-style:italic">No themes yet. Min-N of 5 open-text responses required for AI synthesis.</span>`
        : `<span style="font-style:italic">Themes appear after grades post and results unlock.</span>`);

  const reflectBody = reflection
    ? `<div style="font-size:11px;color:var(--muted-fg);margin-bottom:4px"><i class="fa-light fa-circle-check" style="color:var(--c-green-fg);margin-right:4px"></i>Saved ${fmtDate(reflection.savedAt.slice(0,10))} by ${escapeHtml(c.instructor)}</div>
       <div style="font-style:italic;color:var(--foreground);font-size:12px;line-height:1.5">&ldquo;${escapeHtml((reflection.q1||'').slice(0,110))}${(reflection.q1||'').length>110?'…':''}&rdquo;</div>`
    : c.surveyStatus==='results-available'
        ? `<div style="margin-bottom:6px;font-size:11px"><i class="fa-light fa-clock" style="color:var(--brand-color);margin-right:4px"></i>Awaiting faculty</div>
           <div style="font-size:11px">${escapeHtml(c.instructor)} got the unlock email. Will write 3 short prompts addressing what students raised.</div>`
        : `<span style="font-style:italic">Unlocks when grades post to SIS. Faculty will see top concerns alongside their results.</span>`;

  const noteBody = note
    ? `<div style="font-size:11px;color:var(--muted-fg);margin-bottom:4px"><i class="fa-light fa-circle-check" style="color:var(--c-green-fg);margin-right:4px"></i>Posted ${fmtDate(note.postedAt)}</div>
       <div style="font-style:italic;color:var(--foreground);font-size:12px;line-height:1.5">&ldquo;${escapeHtml(note.note.slice(0,110))}${note.note.length>110?'…':''}&rdquo;</div>
       <div style="font-size:10px;color:var(--brand-color-dark);margin-top:6px"><i class="fa-light fa-arrow-right" style="margin-right:3px"></i>Shows at top of next ${c.code} survey</div>`
    : reflection
        ? `<div style="margin-bottom:6px;font-size:11px"><i class="fa-light fa-clock" style="color:var(--brand-color);margin-right:4px"></i>Faculty has reflected, note pending</div>
           <div style="font-size:11px">2-sentence note will appear at the top of next cohort's survey, closing the feedback loop students can see.</div>`
        : `<span style="font-style:italic">Posts after faculty saves a reflection. Visible to next cohort to show their predecessors were heard.</span>`;

  const cqiBody = cqi
    ? `<div style="font-size:11px;color:var(--muted-fg);margin-bottom:4px"><i class="fa-light fa-circle-check" style="color:var(--c-green-fg);margin-right:4px"></i>${cqi.status==='open'?'Open':cqi.status==='reassessment-due'?'Reassessment due':'Closed'} · reassess ${termOf(cqi.reassessTermId)?.name||'?'}</div>
       <div style="font-style:italic;color:var(--foreground);font-size:12px;line-height:1.5">&ldquo;${escapeHtml((cqi.action||'').slice(0,110))}${(cqi.action||'').length>110?'…':''}&rdquo;</div>
       <div style="font-size:10px;color:var(--brand-color-dark);margin-top:6px"><i class="fa-light fa-shield-check" style="margin-right:3px"></i>CAPTE 2C evidence chain</div>`
    : (topConcern || (c.avg!==null && c.avg<3.7))
        ? `<div style="margin-bottom:6px;font-size:11px"><i class="fa-light fa-circle-exclamation" style="color:var(--c-amber-fg);margin-right:4px"></i>${topConcern?`Top concern: <strong style="color:var(--foreground)">${escapeHtml(topConcern.name)}</strong>`:`Score ${c.avg.toFixed(2)} is below 3.7 threshold`}</div>
           <button class="btn btn-primary btn-xs" onclick="event.stopPropagation();setPersona('pd');state.pdView='cqi';openCqiCreate('${c.id}')"><i class="fa-light fa-plus"></i>${topConcern?`Create CQI from "${escapeHtml(topConcern.name)}"`:'Create CQI action'}</button>`
        : `<span style="font-style:italic">No CQI required — all themes positive and avg ≥ 3.7. Logged as "no action" for accreditation evidence.</span>`;

  const railHtml = `
    <div class="card" style="grid-column:1 / -1">
      <div class="card-head" style="margin-bottom:14px"><div>
        <div class="card-title"><i class="fa-light fa-arrows-spin"></i>Action loop</div>
        <div class="card-sub">From student concerns to next-cohort improvement. Each step unlocks the next; the loop closes when a CQI action is logged for accreditation.</div>
      </div></div>
      <div style="position:relative;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap">
        <div style="position:absolute;left:32px;right:32px;top:16px;height:2px;background:var(--hairline);z-index:0;pointer-events:none"></div>
        <div style="display:flex;flex:1;gap:14px;flex-wrap:wrap;position:relative;z-index:1">
          ${stepCol(1,'themes',  'Students said',     'fa-comments',           themesBody)}
          ${stepCol(2,'reflect', 'Faculty reflected', 'fa-pen-to-square',      reflectBody)}
          ${stepCol(3,'note',    'Note for next cohort','fa-comment-dots',     noteBody)}
          ${stepCol(4,'cqi',     'CQI action',        'fa-clipboard-list-check', cqiBody)}
        </div>
      </div>
    </div>
  `;

  return `
    <div class="page-header">
      <div>
        <a class="btn btn-link" onclick="closeSurveyDetail()"><i class="fa-light fa-arrow-left"></i>Back</a>
        <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
          <span class="badge ${t.badge}" style="font-size:12px;padding:4px 10px"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${t.color};margin-right:4px"></span>${t.name}</span>
          <span class="badge ${surveyStatusBadge(c.surveyStatus)}">${surveyStatusLabel(c.surveyStatus)}</span>
          <span class="badge badge-version">${tmpl.name} v${tmpl.version}</span>
          ${c.disabled?'<span class="badge badge-amber"><i class="fa-light fa-ban"></i>Disabled</span>':''}
        </div>
        <div class="page-title" style="margin-top:8px">${c.code}: ${escapeHtml(c.name)}</div>
        <div style="font-size:13px;color:var(--muted-fg);margin-top:4px"><i class="fa-light fa-user" style="margin-right:4px"></i>${escapeHtml(c.instructor)}  ·  <i class="fa-light fa-graduation-cap" style="margin-right:4px"></i>${term.name}  ·  <i class="fa-light fa-users" style="margin-right:4px"></i>${c.enrolled} enrolled</div>
      </div>
      <div class="page-actions">
        ${c.surveyStatus==='live'?`<button class="btn btn-outline btn-sm" onclick="sendReminderManual('${c.id}')"><i class="fa-light fa-bell"></i>Send reminder</button>`:''}
        <button class="btn btn-outline btn-sm" onclick="previewEmailModal('invitation','${c.id}')"><i class="fa-light fa-envelope"></i>Preview emails</button>
        ${c.surveyStatus==='pending-review'&&!c.gradesPosted?`<button class="btn btn-outline btn-sm" onclick="markGradesSubmitted('${c.id}')"><i class="fa-light fa-unlock"></i>Mark grades posted to SIS</button>`:''}
        ${c.surveyStatus==='pending-review'&&c.gradesPosted?`<button class="btn btn-primary btn-sm" onclick="publishResults('${c.id}')"><i class="fa-light fa-paper-plane"></i>Publish results to faculty</button>`:''}
      </div>
    </div>

    ${c.surveyStatus==='pending-review' ? renderModerationCard(c) : ''}

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Completion</div><div class="kpi-val">${c.completion}%<small>${responded}/${c.enrolled}</small></div><div class="kpi-meta">${c.completion>=65?'<i class="fa-light fa-check"></i>Above ARC-PA 65%':'<i class="fa-light fa-triangle-exclamation"></i>Below 65% target'}</div></div>
      <div class="kpi"><div class="kpi-label">Avg score</div><div class="kpi-val">${c.avg!==null?c.avg.toFixed(2):'--'}<small>${c.avg!==null?'/ 5.0':''}</small></div><div class="kpi-meta">${c.avg!==null?'vs '+(c.prev||'--')+' prior':'Not yet released'}</div></div>
      <div class="kpi"><div class="kpi-label">Reminders fired</div><div class="kpi-val">${events.filter(e=>e.icon==='fa-bell'&&e.state==='done').length}<small>of 2</small></div><div class="kpi-meta">Day 3 + Day 7 cadence</div></div>
      <div class="kpi"><div class="kpi-label">Days remaining</div><div class="kpi-val">${Math.max(0,Math.ceil(((new Date(closeIso))-(new Date(todayIso)))/86400000))}<small>d</small></div><div class="kpi-meta">Closes ${shortDate(closeIso)}</div></div>
    </div>

    <div class="dash-grid">
      <div class="card">
        <div class="card-head"><div><div class="card-title"><i class="fa-light fa-timeline"></i>Survey lifecycle</div><div class="card-sub">From distribution to results released. Click any sent email to preview what students or faculty received.</div></div></div>
        <div style="position:relative;padding-left:20px">
          <div style="position:absolute;left:9px;top:8px;bottom:8px;width:2px;background:var(--border)"></div>
          ${events.map(e=>`
            <div style="display:flex;gap:12px;padding:8px 0;align-items:flex-start;position:relative">
              <div style="position:absolute;left:-15px;width:18px;height:18px;border-radius:50%;background:${e.state==='done'?(e.alert?'var(--c-amber)':'var(--c-green)'):'var(--muted-2)'};color:white;display:flex;align-items:center;justify-content:center;font-size:9px;border:2px solid white;box-shadow:0 0 0 1px var(--border)"><i class="fa-light ${e.icon}"></i></div>
              <div style="flex:1;${e.state==='pending'?'opacity:0.55':''}">
                <div style="font-size:13px;font-weight:600">${e.label} ${e.state==='pending'?'<span class="badge badge-muted" style="font-size:9px;margin-left:5px">Pending</span>':''}</div>
                <div style="font-size:11px;color:var(--muted-fg);margin-top:2px">${e.when} · ${e.detail}</div>
                ${e.emailKind?`<button class="btn btn-link" style="font-size:11px;margin-top:4px" onclick="previewEmailModal('${e.emailKind}','${c.id}')">Preview email →</button>`:''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="card">
        <div class="card-head"><div><div class="card-title"><i class="fa-light fa-chart-line-up"></i>Response trajectory</div><div class="card-sub">Cumulative completion since survey opened. Dashed line is ARC-PA 65% threshold.</div></div></div>
        ${trajectorySvg}
      </div>

      <div class="card full">
        <div class="card-head"><div><div class="card-title"><i class="fa-light fa-square-poll-vertical"></i>Per-question distribution</div><div class="card-sub">PRISM-style breakdown of how students rated each question.</div></div></div>
        ${qHtml}
      </div>

      ${railHtml}
    </div>
  `;
}

/* ── Email preview modal ─────────────────────────────────────────── */
function previewEmailModal(kind, cid){
  const c = courseOf(cid);
  const note = noteForCourse(c.code, c.termId);
  const tmpl = templateForCourse(c);
  const term = termOf(c.termId);

    reminder3: {

      subject:`Reminder: ${c.code} evaluation closes ${shortDate(closeDate)}`,
      body:`<h2 style="font-family:var(--font-heading);font-size:18px;font-weight:500">Just 3 minutes.</h2>
        <p style="font-size:13px;line-height:1.6;color:var(--muted-fg);margin:11px 0">Your evaluation for <strong style="color:var(--foreground)">${c.code}</strong> is still open.</p>
        <p style="font-size:13px;line-height:1.6;color:var(--muted-fg)">Quick summary of why this matters: programs that hit 70%+ response rate get the data they need to prove curriculum quality at accreditation. We are at <strong style="color:var(--foreground)">${c.completion}%</strong> right now.</p>
        <a href="#" style="display:inline-block;padding:10px 20px;background:var(--brand-color);color:white;border-radius:var(--radius-sm);font-weight:600;font-size:13px;text-decoration:none;margin:14px 0">Take 3 minutes now</a>
        <p style="font-size:11px;color:var(--muted-fg);line-height:1.55;margin-top:14px">Closes ${fmtDate(closeDate)}. Anonymous. Sent only because we have not received your response yet.</p>`,

    reminder7: {

      subject:`${c.code}: Last chance, your input changed the course last year`,
      body:`<h2 style="font-family:var(--font-heading);font-size:18px;font-weight:500">Your feedback already changed this course.</h2>
        ${note?`<div style="background:var(--brand-tint);border:1px solid color-mix(in oklch, var(--brand-color) 18%, white);padding:14px;border-radius:var(--radius-sm);margin:14px 0"><div style="font-size:11px;color:var(--brand-color-deep);font-weight:700;text-transform:uppercase;letter-spacing:.06em">From ${escapeHtml(note.facultyName)} after last cohort</div><div style="font-size:13px;color:var(--foreground);font-style:italic;margin-top:8px;line-height:1.55">"${escapeHtml(note.note)}"</div></div>`:'<p style="font-size:13px;line-height:1.6;color:var(--muted-fg)">Last cohort told us what to change. Your turn this year.</p>'}
        <a href="#" style="display:inline-block;padding:10px 20px;background:var(--brand-color);color:white;border-radius:var(--radius-sm);font-weight:600;font-size:13px;text-decoration:none;margin:14px 0">Submit anonymously now</a>

/* ── Setup Wizard (4 steps) ───────────────────────────────────────── */
function renderCoordWizard(){
  const stepDefs = [
    {n:1, label:'Scope'},
    {n:2, label:'Templates'},
    {n:3, label:'Roster review'},
    {n:4, label:'Push to autopilot'},
  ];
  const stepper = `<div class="wiz-stepper">${stepDefs.map((s,i)=>{
    const cls = state.wizardStep>s.n ? 'done' : state.wizardStep===s.n ? 'active' : '';
    return `<div class="wiz-step ${cls}">
      <div class="wiz-step-circle">${state.wizardStep>s.n?'<i class="fa-light fa-check"></i>':s.n}</div>
      <div class="wiz-step-label">${s.label}</div>
      ${i<stepDefs.length-1?'<div class="wiz-step-line"></div>':''}
    </div>`;
  }).join('')}</div>`;

  let body='', actions='';
  if(state.wizardStep===1) {body=wizStep1(); actions=wizFoot1();}
  else if(state.wizardStep===2) {body=wizStep2(); actions=wizFoot2();}
  else if(state.wizardStep===3) {body=wizStep3(); actions=wizFoot3();}
  else {body=wizStep4(); actions=wizFoot4();}

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Create surveys for ${termOf(state.termId).name}</div>
        <div class="page-subtitle">One pass at the start of term creates the survey instances and hands them to autopilot. After Step 4, autopilot owns scheduling, reminders, and grade-lock; you only intervene if something goes wrong.</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-outline btn-sm" onclick="setView('autopilot')"><i class="fa-light fa-rocket-launch"></i>Back to autopilot</button>
      </div>
    </div>
    ${stepper}
    <div class="wiz-card">
      <div class="wiz-card-body">${body}</div>
      <div class="wiz-card-foot">${actions}</div>
    </div>
  `;
}

function wizStep1(){
  const term = termOf(state.termId);
  const eligible = COURSES.filter(c=>c.termId===state.termId);
  const grouped = COURSE_TYPES.map(t=>({type:t, courses:eligible.filter(c=>c.typeId===t.id)})).filter(g=>g.courses.length);
  const rows = grouped.map(g=>{
    const tmpl = TEMPLATES.find(tp=>tp.boundCourseTypes.includes(g.type.id));
    const noTmplBanner = !tmpl ? `<div style="background:var(--c-amber-bg);color:var(--c-amber-fg);padding:8px 12px;border-radius:var(--radius-sm);font-size:11px;margin:6px 0 10px"><i class="fa-light fa-triangle-exclamation"></i> No template bound to ${g.type.name}. These courses will be skipped. Bind a template under Templates first.</div>` : '';
    return `
      <div style="margin-bottom:18px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span class="badge ${g.type.badge}"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${g.type.color};margin-right:4px"></span>${g.type.name}</span>
          <span style="font-size:11px;color:var(--muted-fg)">${g.courses.length} course${g.courses.length===1?'':'s'} · template: ${tmpl ? tmpl.name+' (v'+tmpl.version+')' : 'none'}</span>
        </div>
        ${noTmplBanner}
        ${g.courses.map(c=>{
          const sel = state.wizardSelected.has(c.id);
          const disabled = !tmpl;
          return `<div class="scope-row ${sel?'selected':''}" style="${disabled?'opacity:0.5;pointer-events:none':''}" onclick="toggleWizSelect('${c.id}')">
            <div class="scope-cb">${sel?'<i class="fa-light fa-check"></i>':''}</div>
            <div class="scope-info">
              <div class="scope-code">${c.code}</div>
              <div class="scope-name">${escapeHtml(c.name)} · ${escapeHtml(c.instructor)} · ${c.enrolled} students</div>
            </div>
            <div class="scope-tmpl">
              <div class="scope-tmpl-lbl">Template</div>
              <div class="scope-tmpl-name">${tmpl ? tmpl.name : '-'}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    `;
  }).join('');

  return `
    <div style="margin-bottom:18px">
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">Step 1 · Confirm scope for ${term.name}</div>
      <div style="font-size:12px;color:var(--muted-fg);line-height:1.55">All active courses pulled from LMS, grouped by type. By default every course with a bound template is selected. Uncheck any course you want to exclude this cycle.</div>
    </div>
    ${rows}
    <div style="font-size:11px;color:var(--muted-fg);margin-top:12px"><i class="fa-light fa-circle-info" style="margin-right:4px"></i>${state.wizardSelected.size} courses selected · about ${Math.round(state.wizardSelected.size*45/60)} hours of student response time across the cohort</div>
  `;
}
function toggleWizSelect(cid){
  if(state.wizardSelected.has(cid)) state.wizardSelected.delete(cid);
  else state.wizardSelected.add(cid);
  renderAll();
}
function wizFoot1(){
  return `
    <div style="font-size:12px;color:var(--muted-fg)"><strong>${state.wizardSelected.size}</strong> courses selected</div>
    <button class="btn btn-primary" onclick="state.wizardStep=2;renderAll()" ${state.wizardSelected.size?'':'disabled'}>Next: Confirm templates<i class="fa-light fa-arrow-right"></i></button>
  `;
}

function wizStep2(){
  const sel = Array.from(state.wizardSelected).map(courseOf).filter(Boolean);
  const rows = sel.map(c=>{
    const overrideId = state.wizardOverrides[c.id];
    const tmpl = overrideId ? templateOf(overrideId) : templateForCourse(c);
    return `<div class="scope-row" style="cursor:default">

      <div style="flex:0 0 240px">

function wizFoot2(){

function wizFoot3(){
  return `
    <button class="btn btn-outline" onclick="state.wizardStep=2;renderAll()"><i class="fa-light fa-arrow-left"></i>Back</button>

      <div style="font-size:13px;color:var(--muted-fg);line-height:2">

function wizFoot4(){
  return `

function pushToAutopilot(){
  const n = state.wizardSelected.size;
  state.activity.unshift({when:new Date().toISOString(), text:`Coordinator pushed ${n} surveys to autopilot for ${termOf(state.termId).name}.`});
  state.coordView='monitor';
  renderAll();
  toast(`${n} surveys handed off to autopilot. Email summary will arrive on open day.`,'success');
}

function addDaysIso(iso, n){ const d=new Date(iso+'T12:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }

/* ── Live Monitor ────────────────────────────────────────────────── */
function renderCoordMonitor(){
  const surveys = COURSES.filter(c=>c.termId===state.termId && ['live','pending-review','results-available'].includes(c.surveyStatus));
  const term = termOf(state.termId);
  const closeDate = addDaysIso(term.endDate, 7);
  const daysToClose = Math.max(0, Math.ceil(((new Date(closeDate)) - (new Date('2026-04-29')))/86400000));
  const totalEnrolled = surveys.reduce((a,c)=>a+c.enrolled,0);
  const totalResponded = surveys.reduce((a,c)=>a+responseCount(c.id),0);
  const overallPct = totalEnrolled ? Math.round(totalResponded/totalEnrolled*100) : 0;
  const lowComp = surveys.filter(c=>c.surveyStatus==='live' && c.completion<50);
  const rows = surveys.map(c=>{
    const responded = responseCount(c.id);
    const status = c.surveyStatus==='live'?'<span class="badge badge-info"><i class="fa-light fa-spinner"></i>Open</span>':c.surveyStatus==='pending-review'?'<span class="badge badge-warn"><i class="fa-light fa-hourglass"></i>Awaiting grades</span>':'<span class="badge badge-success"><i class="fa-light fa-check"></i>Released</span>';
    const barCls = c.completion<40?'danger':c.completion<55?'warn':'';
    return `<tr class="mon-tr" style="cursor:pointer" onclick="openSurveyDetail('${c.id}','coord')">
      <td class="mon-td"><strong>${c.code}</strong><div style="font-size:11px;color:var(--muted-fg)">${escapeHtml(c.name)}</div></td>
      <td class="mon-td">${escapeHtml(c.instructor)}</td>
      <td class="mon-td">${status}</td>
      <td class="mon-td"><div class="mon-bar"><div class="mon-bar-track"><div class="mon-bar-fill ${barCls}" style="width:${c.completion}%"></div></div><span class="mon-bar-num">${c.completion}%</span></div><div style="font-size:11px;color:var(--muted-fg)">${responded}/${c.enrolled}</div></td>
      <td class="mon-td"><div style="font-size:12px">${shortDate(closeDate)}</div><div style="font-size:11px;color:var(--muted-fg)">${daysToClose}d remaining</div></td>
      <td class="mon-td" onclick="event.stopPropagation()"><div style="display:flex;gap:5px">${c.surveyStatus==='live'?`<button class="btn btn-outline btn-xs" onclick="sendReminderManual('${c.id}')"><i class="fa-light fa-bell"></i>Remind</button>`:''}${c.surveyStatus==='pending-review'?`<button class="btn btn-primary btn-xs" onclick="markGradesSubmitted('${c.id}')"><i class="fa-light fa-unlock"></i>Confirm grades</button>`:''}</div></td>
    </tr>`;
  }).join('');

  const lowCompBanner = lowComp.length ? `
    <div class="card" style="margin-bottom:14px;background:var(--c-amber-bg);border-color:color-mix(in oklch, var(--c-amber) 25%, white)">
      <div style="display:flex;align-items:flex-start;gap:11px">
        <i class="fa-light fa-triangle-exclamation" style="color:var(--c-amber-fg);font-size:18px;margin-top:2px"></i>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--c-amber-fg)">Day 10 alert: ${lowComp.length} survey${lowComp.length>1?'s':''} below 50% completion</div>
          <div style="font-size:12px;color:var(--c-amber-fg);margin-top:4px">${lowComp.map(c=>c.code).join(', ')} need attention. Personalized Day 7 reminders already sent. Consider reaching out to faculty to encourage completion.</div>
        </div>
        <button class="btn btn-amber btn-sm" onclick="bulkRemind()"><i class="fa-light fa-bell"></i>Bulk reminder</button>
      </div>
    </div>
  ` : '';

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Live Monitor</div>
        <div class="page-subtitle">Real-time response rates by course. Reminders fire automatically at Day 3, 7 and 10. Manually reach out only if needed.</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-outline btn-sm" onclick="setView('wizard')"><i class="fa-light fa-wand-magic-sparkles"></i>Setup wizard</button>
        <button class="btn btn-outline btn-sm" onclick="setView('audit')"><i class="fa-light fa-clipboard-check"></i>Audit trail</button>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Active surveys</div><div class="kpi-val">${surveys.length}</div><div class="kpi-meta">${termOf(state.termId).name}</div></div>
      <div class="kpi"><div class="kpi-label">Overall completion</div><div class="kpi-val">${overallPct}%<small>${totalResponded}/${totalEnrolled}</small></div><div class="kpi-meta"><i class="fa-light fa-${overallPct>=65?'check':'triangle-exclamation'}"></i>${overallPct>=65?'Above ARC-PA target':'Below 65% target'}</div></div>
      <div class="kpi"><div class="kpi-label">Below 50%</div><div class="kpi-val">${lowComp.length}</div><div class="kpi-meta">Day 10 alerts triggered</div></div>
      <div class="kpi"><div class="kpi-label">Until close</div><div class="kpi-val">${daysToClose}d</div><div class="kpi-meta">Closes ${shortDate(closeDate)}</div></div>
    </div>

    ${lowCompBanner}

    <table class="mon-table">
      <thead><tr>
        <th class="mon-th">Course</th><th class="mon-th">Instructor</th><th class="mon-th">Status</th><th class="mon-th">Completion</th><th class="mon-th">Closes</th><th class="mon-th"></th>
      </tr></thead>
      <tbody>${rows || `<tr><td colspan="6" class="empty"><div style="font-size:24px;color:var(--border-strong);margin-bottom:8px"><i class="fa-light fa-inbox"></i></div><div style="font-size:13px">No active surveys for this term yet. Run the setup wizard to push a batch.</div><button class="btn btn-primary btn-sm" style="margin-top:14px" onclick="setView('wizard')"><i class="fa-light fa-wand-magic-sparkles"></i>Open setup wizard</button></td></tr>`}</tbody>
    </table>
  `;
}
function sendReminderManual(cid){
  const c = courseOf(cid);
  state.activity.unshift({when:new Date().toISOString(), text:`Manual reminder sent for ${c.code} to non-completers (${c.enrolled-responseCount(cid)} students).`});
  toast(`Reminder sent to ${c.enrolled-responseCount(cid)} students for ${c.code}.`,'success');
  renderAll();
}
function bulkRemind(){
  state.activity.unshift({when:new Date().toISOString(), text:`Bulk reminder sent to all low-completion surveys.`});
  toast('Bulk reminders sent to non-completers across all flagged courses.','success');
  renderAll();
}

/* ── Audit Trail ─────────────────────────────────────────────────── */
function renderCoordAudit(){
  /* Build audit events: open, close, grades-submitted, reflections, notes, CQI actions */
  const events = [];
  COURSES.filter(c=>c.termId===state.termId).forEach(c=>{
    const term = termOf(c.termId);
    const openIso = addDaysIso(term.endDate,-14);
    events.push({when:openIso+'T09:00', courseCode:c.code, type:'opened', text:`Survey opened automatically (14 days before term end). Invitation emails sent to ${c.enrolled} students.`});
    /* FR-09 reminder cadence: Day 3, Day 7, Day 10 */
    if(['live','pending-review','results-available'].includes(c.surveyStatus)){
      const non3 = c.enrolled - Math.round(c.enrolled * Math.min(c.completion+25,75)/100);
      events.push({when:addDaysIso(openIso,3)+'T09:00', courseCode:c.code, type:'reminder', text:`Day 3 personalized reminder sent to ${Math.max(0,non3)} non-completers (FR-09).`});
      const non7 = c.enrolled - Math.round(c.enrolled * Math.min(c.completion+10,85)/100);
      events.push({when:addDaysIso(openIso,7)+'T09:00', courseCode:c.code, type:'reminder', text:`Day 7 reminder sent to ${Math.max(0,non7)} non-completers, referencing the prior cohort feedback note.`});
      if(c.completion < 50){
        events.push({when:addDaysIso(openIso,10)+'T09:00', courseCode:c.code, type:'alert', text:`Day 10 alert: completion at ${c.completion}%, below 50% threshold. Coordinator notified.`});
      }
    }
    if(['pending-review','results-available'].includes(c.surveyStatus)){
      events.push({when:addDaysIso(term.endDate,7)+'T17:00', courseCode:c.code, type:'closed', text:`Survey closed automatically. ${responseCount(c.id)} of ${c.enrolled} students responded.`});
    }
    if(c.surveyStatus==='results-available'){
      events.push({when:addDaysIso(term.endDate,9)+'T10:30', courseCode:c.code, type:'grades', text:`Final grades submitted by faculty. Faculty results unlocked.`});
    }
  });
  REFLECTIONS.forEach(r=>{
    const c = courseOf(r.courseId);
    if(c && c.termId===state.termId) events.push({when:r.savedAt, courseCode:c.code, type:'reflection', text:`Faculty reflection saved by ${ME_FACULTY.name}.`});
  });
  FEEDBACK_NOTES.filter(n=>n.termId===state.termId).forEach(n=>{
    events.push({when:n.postedAt+'T14:00', courseCode:n.courseCode, type:'note', text:`Feedback note posted for next cohort by ${escapeHtml(n.facultyName)}.`});
  });
  CQI_ACTIONS.filter(a=>a.termId===state.termId).forEach(a=>{
    events.push({when:a.createdAt+'T11:00', courseCode:a.courseCode, type:'cqi', text:`CQI action created: ${escapeHtml(a.action.slice(0,80))}...`});
  });
  state.activity.forEach(a=>{ events.push({when:a.when, courseCode:'system', type:'system', text:a.text}); });
  events.sort((a,b)=>(b.when||'').localeCompare(a.when||''));

  const iconMap = {opened:'fa-paper-plane',reminder:'fa-bell',alert:'fa-triangle-exclamation',closed:'fa-lock',grades:'fa-unlock',reflection:'fa-pen-to-square',note:'fa-comment-dots',cqi:'fa-clipboard-list-check',system:'fa-circle-info'};
  const colorMap = {opened:'var(--c-indigo)',reminder:'var(--brand-color)',alert:'var(--c-amber-fg)',closed:'var(--muted-fg)',grades:'var(--c-green-fg)',reflection:'var(--brand-color-dark)',note:'var(--brand-color)',cqi:'var(--c-amber-fg)',system:'var(--muted-fg)'};

  const rows = events.map(e=>`
    <div style="display:flex;gap:11px;padding:11px 16px;border-bottom:1px solid var(--border)">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--muted);color:${colorMap[e.type]};display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0"><i class="fa-light ${iconMap[e.type]}"></i></div>
      <div style="flex:1">
        <div style="font-size:13px"><strong>${e.courseCode}</strong> · ${e.text}</div>
        <div style="font-size:11px;color:var(--muted-fg);margin-top:3px">${escapeHtml(e.when.replace('T',' ').slice(0,16))}</div>
      </div>
    </div>
  `).join('');

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Audit Trail</div>
        <div class="page-subtitle">Complete event log for accreditation evidence. Per FR-29, exportable in under 5 minutes for any 3-year window.</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-outline btn-sm" onclick="setView('monitor')"><i class="fa-light fa-chart-line"></i>Monitor</button>
        <button class="btn btn-primary btn-sm" onclick="exportAudit()"><i class="fa-light fa-arrow-down-to-line"></i>Export CSV</button>
      </div>
    </div>
    <div class="card card-flush">${rows || '<div class="empty">No events for this term yet.</div>'}</div>
  `;
}
function exportAudit(){
  const rows = [['Timestamp','Course','Event','Description']];
  state.activity.forEach(a=>rows.push([a.when, '', 'system', a.text]));
  const csv = rows.map(r=>r.map(v=>{const s=String(v||'');return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`pce-audit-${termOf(state.termId).name.toLowerCase().replace(/\s+/g,'-')}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('Audit trail exported.','success');
}
/* ════════════════════════════════════════════════════════════════════
   FACULTY (FR-11 self-view, FR-18 reflection, FR-16 feedback loop,
            FR-03 min-N suppression, FR-06 grade-lock gate)
   ════════════════════════════════════════════════════════════════════ */
function renderFaculty(){
  if(state.facView==='reflect')  return renderFacReflection();
  if(state.facView==='feedback') return renderFacFeedback();
  return renderFacResults();
}

function renderFacResults(){
  const myCourses = ME_FACULTY.myCourses.map(courseOf).filter(c=>c && c.termId===state.termId);
  if(!myCourses.length){
    return `<div class="page-header"><div><div class="page-title">My Results</div><div class="page-subtitle">No courses for ${termOf(state.termId).name}.</div></div></div>`;
  }
  /* Course tabs sidebar */
  const courseList = myCourses.map(c=>{
    const sel = state.facCourseId===c.id ? 'background:var(--brand-tint);border-left:3px solid var(--brand-color);padding-left:11px':'';
    let statusBadge = '';
    if(c.surveyStatus!=='results-available'){
      statusBadge = '<span class="badge badge-locked"><i class="fa-light fa-lock"></i>Locked</span>';
    } else if(c.minNFail || responseCount(c.id)<5){
      statusBadge = '<span class="badge badge-warn"><i class="fa-light fa-eye-slash"></i>Suppressed</span>';
    } else {
      statusBadge = `<span class="badge badge-success">${c.avg.toFixed(1)} avg</span>`;
    }
    return `<div onclick="state.facCourseId='${c.id}';renderAll()" style="display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:1px solid var(--border);cursor:pointer;${sel}">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600">${c.code}</div>
        <div style="font-size:11px;color:var(--muted-fg);margin-top:2px">${escapeHtml(c.name)}</div>
        <div style="font-size:10px;color:var(--muted-fg);margin-top:4px">${termOf(c.termId).name} · ${c.enrolled} enrolled</div>
      </div>
      ${statusBadge}
    </div>`;
  }).join('');

  const c = courseOf(state.facCourseId) || myCourses[0];
  state.facCourseId = c.id;

  let detailHtml = '';
  if(c.surveyStatus !== 'results-available'){
    /* Grade-lock gate (FR-06) */
    detailHtml = `
      <div class="fac-locked">
        <div class="fac-locked-icon"><i class="fa-light fa-lock-keyhole"></i></div>
        <div class="fac-locked-title">Results unlock after you submit final grades</div>
        <div class="fac-locked-msg">${surveyStatusLabel(c.surveyStatus)} for ${c.code}. This timing protects you and your students from grade-related bias. Once your grades are recorded in the SIS, your evaluation results unlock automatically.</div>
        <div style="margin-top:18px;font-size:12px;color:var(--c-amber-fg);background:white;border-radius:var(--radius-sm);padding:10px 14px;display:inline-flex;align-items:center;gap:8px"><i class="fa-light fa-circle-info"></i>Use the demo controls (bottom-right) to simulate "grades submitted" for ${c.code}.</div>
      </div>
    `;
  } else if(c.minNFail || responseCount(c.id) < 5){
    /* Min-N suppression (FR-03) */
    detailHtml = `
      <div class="fac-suppress">
        <div class="fac-suppress-icon"><i class="fa-light fa-eye-slash"></i></div>
        <div class="fac-suppress-title">Cohort too small to display individual results</div>
        <div class="fac-suppress-msg">${responseCount(c.id)} of 5 minimum responses received. To protect student anonymity in small cohorts, we hold individual results until at least 5 students have responded. Aggregate program-level data still includes this course.</div>
      </div>
    `;
  } else {
    /* Real results view */
    const tmpl = templateForCourse(c);
    const responded = responseCount(c.id);
    const themes = COURSE_THEMES[c.id] || [];
    const reflectionDone = REFLECTIONS.find(r=>r.courseId===c.id && r.facultyId===ME_FACULTY.id);
    const noteAlreadyPosted = FEEDBACK_NOTES.find(n=>n.courseCode===c.code && n.termId===c.termId);

    /* Three-tier model (FR-11): faculty sees ONLY their own results.
       Filter expanded sections to: Course Content + my own Tier 2 (if I direct)
       + my own Tier 3 (if I teach). Other directors / faculty are never shown. */
    const myPersonId = ME_FACULTY.personId || personByName(ME_FACULTY.name)?.id;
    const expanded = expandedSurveySections(c, tmpl);
    const myExpanded = expanded.filter(e=> e.kind==='course' || (e.target && e.target.id === myPersonId));
    const allRespData = buildResponseData(c);
    const myTiers = myPersonId ? myTiersForCourse(myPersonId, c.id) : {};
    const tierContextBanner = `<div style="background:var(--brand-tint);border:1px solid color-mix(in oklch, var(--brand-color) 18%, white);border-radius:var(--radius-sm);padding:11px 13px;font-size:11px;color:var(--brand-color-deep);margin-bottom:14px;display:flex;align-items:flex-start;gap:8px"><i class="fa-light fa-shield-check" style="margin-top:2px"></i><div>${(myTiers.tier2 && myTiers.tier3)?'You hold both tiers on this course (director + instructor); your results show both sections.':myTiers.tier2?'You direct this course (Tier 2). Co-instructors and other faculty have private results not visible to you.':myTiers.tier3?'You teach this course (Tier 3). You see only your own instruction scores; co-instructors and the course director have separate, private results.':'You are not currently assigned to this course.'}</div></div>`;
    const sectionsHtml = myExpanded.map(e=>{
      const sec = e.sec;
      const tierBadge = e.kind==='tier-2' ? '<span class="badge badge-info" style="font-size:9px;margin-left:6px"><i class="fa-light fa-user-tie"></i>Tier 2</span>' : e.kind==='tier-3' ? '<span class="badge badge-rose" style="font-size:9px;margin-left:6px"><i class="fa-light fa-chalkboard-user"></i>Tier 3</span>' : '';
      const qRows = sec.questions.filter(q=>{ const def=getQuestion(q); return def?.type==='likert'; }).map(q=>{
        const def = getQuestion(q);
        const seed = (c.id + def.id).split('').reduce((a,ch)=>a+ch.charCodeAt(0),0);
        const score = Math.max(2.5, Math.min(5.0, c.avg + ((seed%9 - 4)/15)));
        const rdIdx = allRespData ? allRespData.questions.findIndex(rq=>rq.text===def.text) : -1;
        const clickable = rdIdx >= 0;
        return `<div style="display:flex;align-items:center;gap:11px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px;${clickable?'cursor:pointer;transition:background var(--tr)':''}" ${clickable?`onmouseover="this.style.background='var(--muted)'" onmouseout="this.style.background='transparent'" onclick="openQuestionDrill('${c.id}',${rdIdx})"`:''}>
          <span style="flex:1">${escapeHtml(def.text)}</span>
          <div style="flex:0 0 100px;display:flex;align-items:center;gap:8px">
            <div style="flex:1;height:5px;background:var(--muted-2);border-radius:99px;overflow:hidden"><div style="height:100%;width:${score/5*100}%;background:var(--brand-color);border-radius:99px"></div></div>
            <span style="font-size:13px;font-weight:600;width:30px;text-align:right">${score.toFixed(1)}</span>
          </div>
          ${clickable?'<i class="fa-light fa-chevron-right" style="color:var(--muted-fg);font-size:11px"></i>':''}
        </div>`;
      }).join('');
      return `<div class="card card-flush" style="margin-bottom:14px">
        <div class="card-section" style="padding:12px 16px"><div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--brand-color-deep)">${escapeHtml(e.label)}${tierBadge}</div></div>
        <div>${qRows}</div>
      </div>`;
    }).join('');

    const themesHtml = themes.length ? themes.map((th,thIdx)=>{
      const sb = th.sentiment==='positive'?'<span class="badge badge-success"><i class="fa-light fa-thumbs-up"></i>Positive</span>':'<span class="badge badge-amber"><i class="fa-light fa-circle-exclamation"></i>Concern</span>';
      return `<div style="padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--tr)" onmouseover="this.style.background='var(--muted)'" onmouseout="this.style.background='transparent'" onclick="openThemeDrill('${c.id}',${thIdx})">
        <div style="display:flex;justify-content:space-between;align-items:center"><strong style="font-size:13px">${escapeHtml(th.name)}</strong>${sb}</div>
        <div style="font-size:11px;color:var(--muted-fg);margin-top:3px">${th.mentions} mentions <span style="margin-left:6px;color:var(--brand-color)">See all quotes <i class="fa-light fa-chevron-right" style="font-size:9px"></i></span></div>
        ${th.quotes.slice(0,1).map(q=>`<div style="font-size:12px;color:var(--muted-fg);font-style:italic;margin-top:7px;line-height:1.55">"${escapeHtml(q)}"</div>`).join('')}
      </div>`;
    }).join('') : '<div class="empty">No qualitative themes available.</div>';

    detailHtml = `
      <div style="background:var(--brand-tint);border:1px solid color-mix(in oklch, var(--brand-color) 18%, white);border-radius:var(--radius);padding:11px 14px;font-size:12px;color:var(--brand-color-deep);display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <i class="fa-light fa-shield-check"></i>${responded} of ${c.enrolled} students responded anonymously. Faculty cannot view comparison to peers, only your own results.
      </div>

      <div class="kpi-grid" style="grid-template-columns:repeat(3, 1fr)">
        <div class="kpi"><div class="kpi-label">Average score</div><div class="kpi-val">${c.avg.toFixed(2)}<small>/ 5.0</small></div><div class="kpi-meta">${trendArrowFac(c.avg, c.prev)} vs ${termOf('tm1').name}</div></div>
        <div class="kpi"><div class="kpi-label">Responses</div><div class="kpi-val">${responded}<small>of ${c.enrolled}</small></div><div class="kpi-meta">${c.completion}% completion</div></div>
        <div class="kpi"><div class="kpi-label">Reflection</div><div class="kpi-val" style="font-size:18px">${reflectionDone?'Saved':'Pending'}</div><div class="kpi-meta">${reflectionDone?'You can post a note for the next cohort':'Complete to unlock next-cohort note'}</div></div>
      </div>

      ${tierContextBanner}
      ${sectionsHtml}

      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title"><i class="fa-light fa-chart-line-up"></i>Longitudinal trend (last 5 terms)</div>
            <div class="card-sub">Same 5 questions, same template line. Comparable because the question bank is locked at university level (FR-13).</div>
          </div>
          <span class="badge badge-success" title="Comparable terms"><i class="fa-light fa-link"></i>5 terms comparable</span>
        </div>
        ${renderFacTrendSvg(c)}
        <div class="trend-legend" style="display:flex;gap:14px;margin-top:8px"><div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted-fg)"><span style="display:inline-block;width:10px;height:3px;border-radius:2px;background:var(--brand-color)"></span>${c.code}</div><div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted-fg)"><span style="display:inline-block;width:10px;height:3px;border-radius:2px;background:var(--muted-fg);opacity:0.6"></span>Program avg</div></div>
      </div>

      <div class="card card-flush" style="margin-top:14px">
        <div class="card-section"><div class="card-title"><i class="fa-light fa-comments"></i>Themes from open-text responses</div><div class="card-sub">AI-extracted themes. Quotes are anonymized; never traceable to individuals.</div></div>
        <div>${themesHtml}</div>
      </div>

      <div class="reflect-card" style="margin-top:18px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div>
            <div style="font-size:14px;font-weight:600;color:var(--brand-color-deep)">${reflectionDone?'Your reflection':'Complete your structured reflection'}</div>
            <div style="font-size:12px;color:var(--brand-color-dark);margin-top:3px">${reflectionDone?'Saved '+fmtDate(reflectionDone.savedAt.split('T')[0])+'. You can edit any time.':'3 short prompts. Required before you can post a note for the next cohort.'}</div>
          </div>
          <button class="btn ${reflectionDone?'btn-outline':'btn-primary'}" onclick="openReflection('${c.id}')"><i class="fa-light fa-pen-to-square"></i>${reflectionDone?'Edit reflection':'Start reflection'}</button>
        </div>
        ${reflectionDone ? `
          <div style="background:white;border-radius:var(--radius);padding:14px;font-size:12px;line-height:1.6">
            <div style="margin-bottom:8px"><strong>What worked well:</strong> ${escapeHtml(reflectionDone.q1)}</div>
            <div style="margin-bottom:8px"><strong>What surprised me:</strong> ${escapeHtml(reflectionDone.q2)}</div>
            <div><strong>One change for next term:</strong> ${escapeHtml(reflectionDone.q3)}</div>
          </div>
        ` : ''}
      </div>

      ${reflectionDone ? `
        <div class="card" style="margin-top:14px;background:color-mix(in oklch, var(--c-green) 6%, white);border-color:color-mix(in oklch, var(--c-green) 25%, white)">
          <div class="card-head">
            <div>
              <div class="card-title" style="color:var(--c-green-fg)"><i class="fa-light fa-comment-dots" style="color:var(--c-green-fg)"></i>${noteAlreadyPosted?'Note posted for next cohort':'Post a 2-sentence note for next cohort'}</div>
              <div class="card-sub">${noteAlreadyPosted?'Visible at the top of '+c.code+' next survey.':'Closes the loop. Students see this on next year evaluation.'}</div>
            </div>
            <button class="btn btn-success btn-sm" onclick="setView('feedback')"><i class="fa-light fa-${noteAlreadyPosted?'pen':'paper-plane'}"></i>${noteAlreadyPosted?'Edit note':'Write note'}</button>
          </div>
          ${noteAlreadyPosted ? `<div style="background:white;border-radius:var(--radius-sm);padding:12px;font-size:13px;font-style:italic;color:var(--foreground);line-height:1.55">"${escapeHtml(noteAlreadyPosted.note)}"</div>` : ''}
        </div>
      ` : ''}
    `;
  }

  return `
    <div class="page-header">
      <div>
        <div class="page-title">My Results</div>
        <div class="page-subtitle">Your own course evaluation results, broken down by question. You see only your own. Results unlock after you submit final grades and once at least 5 students respond.</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:280px 1fr;gap:18px;align-items:flex-start">
      <div class="card card-flush" style="position:sticky;top:0">${courseList}</div>
      <div>${detailHtml}</div>
    </div>
  `;
}

function renderFacTrendSvg(c){
  const labels = ['Sp 24','Fa 24','Sp 25','Fa 25','Sp 26'];
  const target = c.avg, prev = c.prev || target;
  const drift = (target - prev) * 0.5;
  const series = [
    +(prev - drift*1.5).toFixed(2),
    +(prev - drift*0.7).toFixed(2),
    +prev.toFixed(2),
    +((prev+target)/2).toFixed(2),
    +target.toFixed(2),
  ];
  const prog = series.map((v,i)=>+(v - 0.25 + Math.cos(i)*0.06).toFixed(2));
  const W=560, H=180, P=30;
  const xs = labels.map((_,i)=>P + i*((W-2*P)/(labels.length-1)));
  const yMin=2.5, yMax=5.0;
  const yScale = v => H-P - ((v-yMin)/(yMax-yMin))*(H-2*P);
  const path = (s, color, dashed) => {
    const d = s.map((v,i)=>`${i===0?'M':'L'} ${xs[i]} ${yScale(v).toFixed(1)}`).join(' ');
    return `<path d="${d}" fill="none" stroke="${color}" stroke-width="${dashed?'1.5':'2.5'}" ${dashed?'stroke-dasharray="4 3"':''} stroke-linecap="round" stroke-linejoin="round"/>` +
           s.map((v,i)=>`<circle cx="${xs[i]}" cy="${yScale(v)}" r="${dashed?2.5:3.5}" fill="${color}"/>`).join('');
  };
  const ys = [3,3.5,4,4.5,5];
  const grid = ys.map(y=>`<line x1="${P}" x2="${W-P}" y1="${yScale(y)}" y2="${yScale(y)}" stroke="oklch(0.93 0.003 270)" stroke-width="1"/><text x="${P-6}" y="${yScale(y)+4}" text-anchor="end" fill="oklch(0.55 0.012 270)" font-size="10">${y.toFixed(1)}</text>`).join('');
  const xl = labels.map((l,i)=>`<text x="${xs[i]}" y="${H-8}" text-anchor="middle" fill="oklch(0.55 0.012 270)" font-size="10">${l}</text>`).join('');
  const valueLabels = series.map((v,i)=>`<text x="${xs[i]}" y="${yScale(v)-9}" text-anchor="middle" fill="oklch(0.28 0.085 286.1)" font-size="10" font-weight="600">${v.toFixed(1)}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:180px;display:block">${grid}${path(prog,'oklch(0.55 0.012 270)',true)}${path(series,'oklch(0.50 0.14 286.1)',false)}${xl}${valueLabels}</svg>`;
}

function trendArrowFac(curr, prev){
  if(curr===null||prev===null) return `<span class="muted">--</span>`;
  const diff = +(curr-prev).toFixed(1);
  if(Math.abs(diff)<0.05) return `<span class="muted"><i class="fa-light fa-minus"></i>±0.0</span>`;
  if(diff>0) return `<span style="color:var(--c-green-fg);font-weight:600"><i class="fa-solid fa-arrow-trend-up"></i>+${diff.toFixed(1)}</span>`;
  return `<span style="color:var(--c-amber-fg);font-weight:600"><i class="fa-solid fa-arrow-trend-down"></i>${diff.toFixed(1)}</span>`;
}

function openTemplateBuilder(id){

function cancelTemplateEdit(){
  /* If was a fresh empty template, drop it */
  const tp = templateOf(state.templateEditId);
  if(tp && tp.name==='Untitled template' && tp.sections.every(s=>s.questions.length===0)){

function renderTemplateBuilder(){
  const tp = state.templateBuilder;
  const orig = templateOf(state.templateEditId);
  const bindingChips = COURSE_TYPES.map(t=>{
    const checked = tp.boundCourseTypes.includes(t.id);
    return `<label style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid ${checked?t.color:'var(--border)'};background:${checked?'color-mix(in oklch, '+t.color+' 8%, white)':'white'};border-radius:99px;cursor:pointer;font-size:11px;font-weight:600;color:${checked?t.color:'var(--muted-fg)'}">
      <input type="checkbox" ${checked?'checked':''} onchange="toggleTmplBinding('${t.id}')" style="display:none">
      <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${t.color}"></span>${t.name}
    </label>`;
  }).join(' ');

  const sectionsHtml = tp.sections.map((sec, sidx)=>{
    const qs = sec.questions.map((qref, qidx)=>{
      const def = getQuestion(qref);
      if(!def){
        return `<div class="tb-question" style="opacity:0.5"><span class="tb-question-text muted">Missing question</span><button class="btn btn-ghost btn-icon-sm" aria-label="Remove question" onclick="removeTmplQ(${sidx},${qidx})"><i class="fa-light fa-xmark"></i></button></div>`;
      }
      return `<div class="tb-question">
        <span class="tb-question-grip" title="Drag to reorder"><i class="fa-solid fa-grip-vertical"></i></span>
        <span class="tb-question-num">${qidx+1}.</span>
        <span class="tb-question-text">${escapeHtml(def.text)}</span>
        <span class="tb-question-type">${def.type==='likert'?'1-5':'Text'}</span>
        <div class="tb-question-actions">
          <button class="btn btn-ghost btn-icon-sm" aria-label="Move question up" onclick="moveTmplQ(${sidx},${qidx},-1)" title="Move up" ${qidx===0?'disabled':''}><i class="fa-light fa-arrow-up"></i></button>
          <button class="btn btn-ghost btn-icon-sm" aria-label="Move question down" onclick="moveTmplQ(${sidx},${qidx},1)" title="Move down" ${qidx===sec.questions.length-1?'disabled':''}><i class="fa-light fa-arrow-down"></i></button>
          <button class="btn btn-ghost btn-icon-sm" aria-label="Remove question" onclick="removeTmplQ(${sidx},${qidx})" title="Remove"><i class="fa-light fa-xmark"></i></button>
        </div>
      </div>`;
    }).join('') || '<div class="empty" style="padding:24px">No questions yet. Add from a question bank.</div>';
    return `<div class="tb-section">
      <div class="tb-section-head">
        <span class="tb-section-name">${escapeHtml(sec.name)}</span>
        <span class="tb-section-type">${sec.type==='course'?'Course content':'Faculty performance'}</span>
        <button class="btn btn-ghost btn-icon-sm" aria-label="Rename section" onclick="renameSection(${sidx})" title="Rename"><i class="fa-light fa-pen"></i></button>
      </div>
      ${qs}
      <div class="tb-add-row">
        <button class="btn btn-outline btn-sm" onclick="openBankPicker(${sidx})"><i class="fa-light fa-plus"></i>Add question from bank</button>
        <span style="font-size:11px;color:var(--muted-fg);align-self:center">Pulls from ${sec.type==='course'?'course content':'faculty'} bank</span>
      </div>
    </div>`;
  }).join('');

  /* Validation */
  const totalQs = tp.sections.reduce((a,s)=>a+s.questions.length,0);
  const ratingQs = tp.sections.reduce((a,s)=>a+s.questions.filter(q=>{const d=getQuestion(q);return d?.type==='likert';}).length,0);
  const validations = [];
  if(!tp.name.trim() || tp.name==='Untitled template') validations.push({type:'err', text:'Template needs a name'});
  if(!tp.boundCourseTypes.length) validations.push({type:'warn', text:'Not bound to any course type yet (won’t be picked up by autopilot)'});
  if(ratingQs<3) validations.push({type:'warn', text:'Fewer than 3 rating questions (FR-04 expects substantive Likert coverage)'});
  if(totalQs>16) validations.push({type:'warn', text:totalQs+' questions may push completion past the 3-minute target'});

  const validHtml = validations.map(v=>`
    <div style="display:flex;align-items:flex-start;gap:8px;padding:7px 0;font-size:12px;color:var(--${v.type==='err'?'destructive-fg':'c-amber-fg'})">
      <i class="fa-light fa-${v.type==='err'?'circle-xmark':'triangle-exclamation'}" style="margin-top:2px"></i><span>${v.text}</span>
    </div>
  `).join('') || '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;font-size:12px;color:var(--c-green-fg)"><i class="fa-light fa-circle-check"></i>Ready to save and use</div>';

  /* Comparability impact: compare working set to original */
  const origQids = orig ? orig.sections.flatMap(s=>s.questions.map(q=>q.questionId)) : [];
  const workingQids = tp.sections.flatMap(s=>s.questions.map(q=>q.questionId));
  const removedQs = origQids.filter(q=>!workingQids.includes(q));
  const addedQs = workingQids.filter(q=>!origQids.includes(q));
  const breaking = removedQs.length;
  const additive = addedQs.length;

  return `
    <div class="page-header">
      <div>
        <a class="btn btn-link" onclick="cancelTemplateEdit()"><i class="fa-light fa-arrow-left"></i>Back to templates</a>
        <div class="page-title" style="margin-top:6px">Edit template</div>

        <button class="btn btn-outline" onclick="cancelTemplateEdit()">Cancel</button>
        <button class="btn btn-primary" onclick="saveTemplate()" ${validations.find(v=>v.type==='err')?'disabled':''}><i class="fa-light fa-check"></i>Save (v${(orig?.version||0)+1})</button>
