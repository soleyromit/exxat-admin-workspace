    </div>

    ${orig ? `<div class="card" style="margin-bottom:16px;background:${breaking?'var(--c-amber-bg)':additive?'var(--brand-tint)':'var(--c-green-bg)'};border-color:${breaking?'color-mix(in oklch, var(--c-amber) 25%, white)':additive?'color-mix(in oklch, var(--brand-color) 18%, white)':'color-mix(in oklch, var(--c-green) 22%, white)'}">
      <div style="display:flex;align-items:flex-start;gap:11px">
        <i class="fa-light ${breaking?'fa-link-slash':additive?'fa-link':'fa-link'}" style="color:${breaking?'var(--c-amber-fg)':additive?'var(--brand-color)':'var(--c-green-fg)'};font-size:18px;margin-top:2px"></i>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:${breaking?'var(--c-amber-fg)':additive?'var(--brand-color-deep)':'var(--c-green-fg)'}">Longitudinal comparability impact: ${breaking?'BREAKS':additive?'safe (additive only)':'preserved'}</div>
          <div style="font-size:12px;color:${breaking?'var(--c-amber-fg)':additive?'var(--brand-color-dark)':'var(--c-green-fg)'};margin-top:5px;line-height:1.6">
            ${breaking?`<strong>${breaking} question${breaking>1?'s':''} removed</strong> from this template. Past terms (v${orig.version} and earlier) kept those questions. Trend chart for the next cohort will show "no comparable data" for those questions. <em>Reason this matters:</em> faculty teaching this course over 5 years lose year-over-year comparison on the questions you remove.`:additive?`<strong>${additive} question${additive>1?'s':''} added.</strong> No removals. Existing trend data stays comparable. New questions start their own trend line from this term.`:'No structural changes detected. Editing wording, scale, or removing rating questions would break longitudinal comparison. Reordering or renaming sections does not.'}
          </div>
          ${breaking?'<div style="font-size:11px;color:var(--c-amber-fg);margin-top:8px;font-style:italic">Best practice: limit template edits to additive changes. Remove a question only when the standard itself is being retired.</div>':''}
        </div>
      </div>
    </div>` : ''}

    <div class="tb-wrap">
      <div class="tb-main">
        <div class="tb-main-head">
          <input type="text" class="tb-name-input" value="${escapeHtml(tp.name)}" oninput="state.templateBuilder.name=this.value">
          <span class="badge badge-version">v${(orig?.version||0)+1} draft</span>
        </div>
        ${sectionsHtml}
      </div>

      <div class="tb-side">
        <div class="tb-side-card">
          <div class="section-label">Course type bindings</div>
          <div style="font-size:11px;color:var(--muted-fg);margin-bottom:10px;line-height:1.5">Autopilot picks this template when scheduling surveys for these course types.</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px">${bindingChips}</div>
        </div>

        <div class="tb-side-card">
          <div class="section-label">Validation</div>
          ${validHtml}
        </div>

        <div class="tb-side-card">
          <div class="section-label">Estimated completion</div>
          <div style="font-size:24px;font-weight:700;color:var(--foreground);line-height:1">${Math.max(1,Math.ceil(totalQs*0.4))} <span style="font-size:13px;color:var(--muted-fg);font-weight:500">min</span></div>
          <div style="font-size:11px;color:var(--muted-fg);margin-top:5px">${totalQs} questions · ${ratingQs} ratings, ${totalQs-ratingQs} open-text<br>FR-30 target: under 3 minutes</div>
        </div>

        <div class="tb-side-card">
          <div class="section-label">Versioning</div>
          <div style="font-size:11px;color:var(--muted-fg);line-height:1.6">Past results stay pinned to the version that was active at the time. Editing this template only affects future surveys. Active surveys mid-cycle keep their pinned version.</div>
        </div>
      </div>
    </div>
  `;
}
function toggleTmplBinding(typeId){
  const tp = state.templateBuilder;
  const i = tp.boundCourseTypes.indexOf(typeId);
  if(i>=0) tp.boundCourseTypes.splice(i,1);
  else tp.boundCourseTypes.push(typeId);
  renderAll();
}
function moveTmplQ(sidx, qidx, dir){
  const sec = state.templateBuilder.sections[sidx];
  const newIdx = qidx+dir;
  if(newIdx<0||newIdx>=sec.questions.length) return;
  const [item] = sec.questions.splice(qidx,1);
  sec.questions.splice(newIdx,0,item);
  renderAll();
}
function removeTmplQ(sidx, qidx){
  state.templateBuilder.sections[sidx].questions.splice(qidx,1);
  renderAll();
}

function saveTemplate(){
  const tp = state.templateBuilder;
  if(!tp.name.trim()){ toast('Template needs a name','warning'); return; }
  const orig = templateOf(state.templateEditId);
  if(orig){
    Object.assign(orig, tp);
    orig.version = orig.version + 1;
    orig.updatedAt = new Date().toISOString().slice(0,10);
    orig.updatedBy = PERSONAS.pd.name;
    orig.status = 'active';
  }
  state.activity.unshift({when:new Date().toISOString(), text:`Template "${orig.name}" saved as v${orig.version}.`});
  state.templateEditId = null;
  state.templateBuilder = null;
  renderAll();
  toast(`Saved "${orig.name}" v${orig.version}. Future surveys will use this version.`,'success');

/* ── CQI Log (FR-14) ─────────────────────────────────────────────── */

  const open = CQI_ACTIONS.filter(a=>a.status==='open');

  const closed = CQI_ACTIONS.filter(a=>a.status==='closed');

  const renderAction = a => {
    const cls = a.status==='closed'?'closed':a.status==='reassessment-due'?'due':'open';
    const lbl = a.status==='closed'?'Closed':a.status==='reassessment-due'?'Reassessment due':'Open';
    return `<div class="cqi-row">
      <div class="cqi-status ${cls}"></div>
      <div class="cqi-content">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="cqi-title">${a.courseCode}: ${escapeHtml(a.courseName)}</span>
          <span class="badge ${cls==='closed'?'badge-success':cls==='due'?'badge-danger':'badge-warn'}">${lbl}</span>

        </div>
        <div style="font-size:12px;color:var(--muted-fg);margin-top:7px;line-height:1.55"><strong style="color:var(--foreground)">Issue identified:</strong> ${escapeHtml(a.issue)}</div>
        <div style="font-size:12px;color:var(--muted-fg);margin-top:5px;line-height:1.55"><strong style="color:var(--foreground)">Action taken:</strong> ${escapeHtml(a.action)}</div>
        ${a.outcome ? `<div style="font-size:12px;color:var(--c-green-fg);margin-top:5px;line-height:1.55;background:var(--c-green-bg);padding:8px 11px;border-radius:var(--radius-sm)"><strong>Reassessment outcome (${fmtDate(a.reassessedAt)}):</strong> ${escapeHtml(a.outcome)}</div>` : ''}
        <div style="display:flex;gap:14px;font-size:11px;color:var(--muted-fg);margin-top:8px">
          <span><i class="fa-light fa-user"></i> Owner: ${escapeHtml(a.owner)}</span>
          <span><i class="fa-light fa-calendar"></i> Created: ${fmtDate(a.createdAt)}</span>
          <span><i class="fa-light fa-arrow-right"></i> Reassess: ${termOf(a.reassessTermId)?.name||'--'}</span>
          ${a.baselineScore?`<span><i class="fa-light fa-chart-line"></i>${a.baselineScore.toFixed(1)} → ${a.currentScore?.toFixed(1)||'pending'}</span>`:''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0">
        ${a.status==='reassessment-due'?`<button class="btn btn-primary btn-sm" onclick="openReassess('${a.id}')"><i class="fa-light fa-clipboard-check"></i>Reassess</button>`:''}
        ${a.status==='open'?`<button class="btn btn-outline btn-sm" onclick="markReassessmentDue('${a.id}')"><i class="fa-light fa-clock"></i>Mark due</button>`:''}
        ${a.status==='closed'?'<i class="fa-light fa-circle-check" style="color:var(--c-green-fg);font-size:18px"></i>':''}
      </div>
    </div>`;
  };

  return `
    <div class="page-header">
      <div>
        <div class="page-title">CQI Action Log</div>
        <div class="page-subtitle">Continuous Quality Improvement chain. Each action links a result to the change you made and the reassessment outcome. This is the documented evidence accreditors look for under CAPTE Standard 2C.</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-outline btn-sm" onclick="exportAccreditationReport()"><i class="fa-light fa-arrow-down-to-line"></i>CAPTE 2C Export</button>
        <button class="btn btn-primary btn-sm" onclick="openCqiCreate()"><i class="fa-light fa-plus"></i>Create CQI Action</button>
      </div>
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(3, 1fr)">
      <div class="kpi"><div class="kpi-label">Open actions</div><div class="kpi-val">${open.length}</div><div class="kpi-meta">In progress</div></div>
      <div class="kpi"><div class="kpi-label">Due for reassessment</div><div class="kpi-val">${due.length}</div><div class="kpi-meta">Next term arrived, time to evaluate</div></div>
      <div class="kpi"><div class="kpi-label">Closed this year</div><div class="kpi-val">${closed.length}</div><div class="kpi-meta">Cycle complete with documented outcome</div></div>
    </div>

    ${due.length ? `<div class="section-label" style="margin-top:18px">Reassessment Due</div><div class="card card-flush">${due.map(renderAction).join('')}</div>` : ''}
    ${open.length ? `<div class="section-label" style="margin-top:18px">Open</div><div class="card card-flush">${open.map(renderAction).join('')}</div>` : ''}
    ${closed.length ? `<div class="section-label" style="margin-top:18px">Closed</div><div class="card card-flush">${closed.map(renderAction).join('')}</div>` : ''}

        <div style="font-size:15px;font-weight:600;margin-bottom:6px">No CQI actions yet</div>

function confirmCqiCreate(){

function confirmReassess(id){
  const a = CQI_ACTIONS.find(x=>x.id===id);
  const score = parseFloat(document.getElementById('re-score').value);
  const outcome = document.getElementById('re-outcome').value.trim();
  if(!outcome){ toast('Outcome narrative required','warning'); return; }
  a.status = 'closed';
  a.currentScore = isNaN(score)?null:score;
  a.outcome = outcome;
  a.reassessedAt = new Date().toISOString().slice(0,10);
  state.activity.unshift({when:new Date().toISOString(), text:`CQI action closed for ${a.courseCode}. Outcome: ${outcome.slice(0,60)}...`});
  closeModal();
  renderAll();
  toast(`Action closed for ${a.courseCode}. Now part of CAPTE 2C evidence.`,'success');
}
function exportAccreditationReport(){
  const rows = [['Standard','Course','Term','Issue Identified','Action Taken','Owner','Status','Reassessed','Baseline','Current','Outcome']];
  CQI_ACTIONS.forEach(a=>{
    rows.push([
      a.accreditationStandard, a.courseCode, termOf(a.termId)?.name||'',
      a.issue, a.action, a.owner, a.status,
      a.reassessedAt||'', a.baselineScore||'', a.currentScore||'', a.outcome||''
    ]);
  });
  const csv = rows.map(r=>r.map(v=>{const s=String(v||'');return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`pce-cqi-evidence-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('CAPTE 2C evidence exported.','success');
}

        </div>

        <div class="anon-badge">
          <i class="fa-light fa-shield-check"></i>
          <div class="anon-badge-content">
            <div class="anon-badge-title">Your responses are anonymous</div>
            <div class="anon-badge-points">No IP address captured. No timestamp shared. No link to your name or email. Faculty see only aggregated scores after submitting grades.</div>
          </div>
        </div>

        ${open.length ? `<div style="padding:8px 18px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-fg)">Open · ${open.length}</div>${open.map(renderItem).join('')}` : (done.length || closed.length || upcoming.length) ? '' : `<div style="padding:40px 24px;text-align:center"><div style="font-size:32px;color:var(--c-green-fg);margin-bottom:14px"><i class="fa-light fa-circle-check"></i></div><div style="font-size:15px;font-weight:600;margin-bottom:6px">All caught up</div><div style="font-size:13px;color:var(--muted-fg);line-height:1.55;max-width:280px;margin:0 auto">No evaluations open right now. We will email you when the next batch opens, usually 2 weeks before term ends.</div></div>`}
        ${(open.length===0 && done.length===0 && upcoming.length===0 && closed.length===0)? '' : ''}
        ${done.length ? `<div style="padding:14px 18px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-fg)">Submitted</div>${done.map(renderDone).join('')}` : ''}
        ${upcoming.length ? `<div style="padding:14px 18px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-fg)">Opens Later</div>${upcoming.map(c=>`<div class="s-list-item" style="opacity:0.55;cursor:default"><div class="s-list-code">${c.code}</div><div class="s-list-name">${escapeHtml(c.name)}</div><div style="font-size:11px;color:var(--muted-fg);margin-top:6px">Opens 2 weeks before term end</div></div>`).join('')}` : ''}

        <div style="padding:18px 18px 24px">
          <div style="font-size:11px;color:var(--muted-fg);text-align:center;line-height:1.6">FERPA compliant · Anonymous responses cannot be traced to you<br>Suppression below 5 responses · Faculty cannot view results until grades are submitted</div>
        </div>
      </div>
    </div>
  `;
}

function startSurvey(cid){
  state.stuView='survey'; state.stuCourseId=cid; state.stuSection=0;
  state.stuRatings={}; state.stuTexts={};
  renderAll();
}

function renderStudentSurvey(){
  const c = courseOf(state.stuCourseId);
  const tmpl = templateForCourse(c);
  if(!tmpl){ state.stuView='list'; return renderStudentList(); }
  const expanded = expandedSurveySections(c, tmpl);
  /* Clamp stuSection to valid index */
  if(state.stuSection >= expanded.length) state.stuSection = expanded.length - 1;
  if(state.stuSection < 0) state.stuSection = 0;
  const cur = expanded[state.stuSection];
  const sec = cur.sec;
  const note = noteForCourse(c.code, c.termId);
  const ratingQs = sec.questions.filter(q=>{ const def=getQuestion(q); return def?.type==='likert'; });
  const answeredRatings = ratingQs.filter(q=>{
    const key = `${cur.keyPrefix}-${q.questionId}`;
    return state.stuRatings[key] !== undefined;
  }).length;
  const allRatingsDone = answeredRatings === ratingQs.length;
  const isLastSection = state.stuSection === expanded.length-1;
  const isFirstCourseSection = cur.kind === 'course' && state.stuSection === 0;
  const noteHtml = isFirstCourseSection && note ? `
    <div class="fb-loop-card">
      <i class="fa-light fa-comment-dots fb-loop-icon"></i>
      <div>
        <div class="fb-loop-title">Note from ${escapeHtml(note.facultyName)}</div>
        <div class="fb-loop-text">"${escapeHtml(note.note)}"</div>
        <div class="fb-loop-attrib">Posted after the ${termOf(note.termId).name} cohort gave feedback</div>
      </div>
    </div>` : '';
  const tierBanner = cur.kind !== 'course' ? `
    <div style="background:${cur.kind==='tier-2'?'oklch(0.95 0.04 264)':'oklch(0.96 0.03 343)'};margin:10px 18px 0;border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;gap:10px;font-size:11px;color:${cur.kind==='tier-2'?'oklch(0.45 0.16 264)':'oklch(0.42 0.15 343)'}">
      <i class="fa-light ${cur.kind==='tier-2'?'fa-user-tie':'fa-chalkboard-user'}"></i>
      <div>You are rating <strong>${escapeHtml(cur.target.name)}</strong> as ${cur.kind==='tier-2'?'course director (organization, communication, structure)':'an instructor (clarity, preparation, responsiveness)'}.</div>
    </div>` : '';

  const qBlocks = sec.questions.map((qref,qi)=>{
    const def = getQuestion(qref);
    if(!def) return '';
    const key = `${cur.keyPrefix}-${qref.questionId}`;
    if(def.type==='likert'){
      const sel = state.stuRatings[key];
      const buttons = [1,2,3,4,5].map(n=>`<button class="likert-btn ${sel===n?'selected':''}" onclick="setRating('${key}',${n})">${n}</button>`).join('');
      return `<div class="q-block">
        <div class="q-text-stu">${escapeHtml(def.text.replace(/\bthe instructor\b/i, cur.target?'Dr. '+cur.target.name.replace('Dr. ',''):'the instructor').replace(/\bthe course director\b/i, cur.target?cur.target.name:'the course director'))}</div>
        <div class="likert-row">${buttons}</div>
        <div class="likert-anchors"><span>Strongly disagree</span><span>Strongly agree</span></div>
      </div>`;
    }
    return `<div class="q-block">
      <div class="q-text-stu">${escapeHtml(def.text)}</div>
      <textarea class="text-input-stu" placeholder="Optional, anonymous response..." oninput="setText('${key}',this.value)">${escapeHtml(state.stuTexts[key]||'')}</textarea>
    </div>`;
  }).join('');

  /* Section tabs: scroll horizontally if many */
  const tabsHtml = expanded.map((e,i)=>{
    const done = computeExpandedSectionDone(e);
    const short = e.kind==='course' ? 'Course' : (e.kind==='tier-2'?'Director: ':'Faculty: ') + (e.target?e.target.name.replace('Dr. ',''):'');
    return `<button class="section-tab-btn ${state.stuSection===i?'active':''}" onclick="state.stuSection=${i};renderAll()" title="${escapeHtml(e.label)}">${escapeHtml(short)} <span class="pip ${done?'done':''}"></span></button>`;
  }).join('');

  return `
    <div class="phone">
      <div class="phone-notch"></div>
      <div class="phone-statusbar">
        <span>9:41</span>
        <span><i class="fa-light fa-signal"></i> <i class="fa-light fa-wifi"></i> <i class="fa-light fa-battery-three-quarters"></i></span>
      </div>
      <div class="phone-header">
        <button class="phone-back" onclick="state.stuView='list';renderAll()" aria-label="Back"><i class="fa-light fa-chevron-left"></i></button>
        <div class="phone-title">${c.code}</div>
        <span style="font-size:11px;color:var(--muted-fg)">v${tmpl.version}</span>
      </div>
      <div class="section-tab" style="overflow-x:auto;-webkit-overflow-scrolling:touch">${tabsHtml}</div>
      <div class="phone-content">
        ${noteHtml}
        ${tierBanner}
        <div style="padding:14px 18px 4px">
          <div style="font-size:11px;color:var(--muted-fg);font-weight:600;text-transform:uppercase;letter-spacing:.06em">Section ${state.stuSection+1} of ${expanded.length}</div>
          <div style="font-size:14px;font-weight:600;margin-top:4px">${escapeHtml(cur.label)}</div>
          <div style="font-size:11px;color:var(--muted-fg);margin-top:4px">${answeredRatings} of ${ratingQs.length} ratings</div>
        </div>
        ${qBlocks}
        <div style="padding:8px 18px 22px;font-size:11px;color:var(--muted-fg);text-align:center">
          <i class="fa-light fa-shield-check" style="margin-right:4px"></i>Anonymous · No IP · No name link
        </div>
      </div>
      <div class="phone-foot">
        ${state.stuSection > 0 ? `<button class="btn btn-outline" style="flex:1" onclick="state.stuSection=${state.stuSection-1};renderAll()"><i class="fa-light fa-chevron-left"></i>Back</button>` : ''}
        ${!isLastSection ? `<button class="btn btn-primary" style="flex:2" onclick="nextSection()" ${!allRatingsDone?'disabled':''}>Next<i class="fa-light fa-chevron-right"></i></button>` : `<button class="btn btn-primary" style="flex:2" onclick="submitSurvey()" ${!allRatingsDone?'disabled':''}>Submit anonymously<i class="fa-light fa-check"></i></button>`}
      </div>
    </div>
  `;
}

function computeExpandedSectionDone(e){
  const ratingQs = e.sec.questions.filter(q=>{ const def=getQuestion(q); return def?.type==='likert'; });
  const answered = ratingQs.filter(q=>state.stuRatings[`${e.keyPrefix}-${q.questionId}`]!==undefined).length;
  return ratingQs.length>0 && answered === ratingQs.length;
}
function setRating(key,n){ state.stuRatings[key]=n; renderAll(); }
function setText(key,v){ state.stuTexts[key]=v; }
function nextSection(){ state.stuSection++; renderAll(); }
function submitSurvey(){
  const c = courseOf(state.stuCourseId);
  ME_STUDENT.completedSurveys.push(state.stuCourseId);
  c.completion = Math.min(100, c.completion + Math.round(100/c.enrolled));
  state.activity.unshift({when:new Date().toISOString(), text:`Anonymous response submitted for ${c.code}.`});
  state.stuView='submitted';
  renderAll();
}

function renderStudentSubmitted(){
  const c = courseOf(state.stuCourseId);
  const open = ME_STUDENT.enrolledCourses.map(courseOf).filter(c=>c && c.termId===state.termId && c.surveyStatus==='live' && !ME_STUDENT.completedSurveys.includes(c.id));
  return `
    <div class="phone">
      <div class="phone-notch"></div>
      <div class="phone-statusbar">
        <span>9:43</span>
        <span><i class="fa-light fa-signal"></i> <i class="fa-light fa-wifi"></i> <i class="fa-light fa-battery-three-quarters"></i></span>
      </div>
      <div class="phone-header">
        <div class="phone-title">Submitted</div>
      </div>
      <div class="phone-content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 24px">
        <div style="width:72px;height:72px;border-radius:50%;background:var(--c-green-bg);color:var(--c-green-fg);display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:18px"><i class="fa-light fa-circle-check"></i></div>
        <div style="font-family:var(--font-heading);font-size:22px;font-weight:500">Thank you, ${ME_STUDENT.name.split(' ')[0]}</div>
        <div style="font-size:13px;color:var(--muted-fg);margin-top:8px;line-height:1.6">Your response for <strong>${c.code}</strong> is in. Your name was never linked.</div>

        <div class="s-card" style="margin:24px 0;text-align:left;width:100%">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--brand-color-deep);margin-bottom:8px"><i class="fa-light fa-arrow-right" style="margin-right:5px"></i>What happens next</div>
          <div style="font-size:12px;color:var(--muted-fg);line-height:1.7">
            <div style="margin-bottom:6px"><strong style="color:var(--foreground)">Now:</strong> Your response joins others, fully anonymized.</div>
            <div style="margin-bottom:6px"><strong style="color:var(--foreground)">After grades close:</strong> ${escapeHtml(c.instructor)} sees aggregated results and writes a short reflection.</div>
            <div><strong style="color:var(--foreground)">Next term:</strong> The note ${escapeHtml(c.instructor)} writes appears at the top of next year's evaluation, so you can see what changed.</div>
          </div>
        </div>

        ${open.length ? `<button class="btn btn-primary" style="width:100%" onclick="state.stuView='list';renderAll()">Continue (${open.length} more open)</button>` : `<button class="btn btn-primary" style="width:100%" onclick="state.stuView='list';renderAll()">Done for now</button>`}
      </div>
    </div>
  `;
}

function openTermSwitcher(){

      <div style="width:10px;height:10px;border-radius:50%;background:${t.status==='active'?'var(--c-green)':t.status==='upcoming'?'var(--c-indigo)':'var(--muted-fg)'}"></div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600">${t.name}</div>
        <div style="font-size:11px;color:var(--muted-fg);margin-top:2px">${fmtDate(t.startDate)} → ${fmtDate(t.endDate)} · ${t.status}</div>

}

        <button class="demo-action" onclick="setPersona('fac');state.facView='results';state.facCourseId='c16';renderAll();toggleDemoPanel()" style="margin-top:5px"><i class="fa-light fa-eye-slash"></i>Faculty: see min-N suppression (Bioethics)</button>

function resetPrototype(){ location.reload(); }

function markGradesSubmitted(cid){
  /* Confirms SIS grade submission. Status stays in 'pending-review' until
     admin moderates comments and clicks "Publish Results". */
  const c = courseOf(cid); if(!c) return;
  c.gradesPosted = true;
  state.activity.unshift({when:new Date().toISOString(), text:`Grades posted to SIS for <strong>${c.code}</strong>. Admin can now publish results once comment moderation is complete.`});
  renderAll();
  toast(`${c.code}: grades posted. Moderate comments and publish to release to faculty.`,'info');
}

function toggleCommentHidden(cid, commentId){
  const list = SURVEY_COMMENTS[cid] || [];
  const cm = list.find(x=>x.id===commentId);
  if(!cm) return;
  cm.hidden = !cm.hidden;
  renderAll();
  toast(cm.hidden ? `Comment hidden from faculty` : `Comment restored`, 'info');
}

function renderModerationCard(c){
  const comments = commentsFor(c.id);
  const hiddenCount = comments.filter(x=>x.hidden).length;
  const flaggedCount = comments.filter(x=>x.flagReason && !x.hidden).length;
  const visibleCount = comments.length - hiddenCount;
  const gradeReady = c.gradesPosted;

  const stepHtml = (n, title, sub, done, current) => `
    <div style="display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="width:24px;height:24px;border-radius:50%;background:${done?'var(--c-green-bg)':current?'var(--brand-tint)':'var(--muted)'};color:${done?'var(--c-green-fg)':current?'var(--brand-color-deep)':'var(--muted-fg)'};font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${done?'<i class="fa-light fa-check"></i>':n}</div>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:600;color:${done?'var(--foreground)':current?'var(--brand-color-deep)':'var(--muted-fg)'}">${title}</div>
        <div style="font-size:11px;color:var(--muted-fg);margin-top:2px;line-height:1.5">${sub}</div>
      </div>
    </div>
  `;
  const sentBadge = s => s==='positive' ? '<span class="badge badge-success" style="font-size:9px"><i class="fa-light fa-thumbs-up"></i>Positive</span>'
                       : s==='constructive' ? '<span class="badge badge-info" style="font-size:9px"><i class="fa-light fa-lightbulb"></i>Constructive</span>'
                       : s==='concern' ? '<span class="badge badge-warn" style="font-size:9px"><i class="fa-light fa-circle-exclamation"></i>Concern</span>'
                       : s==='unprofessional' ? '<span class="badge badge-danger" style="font-size:9px"><i class="fa-light fa-flag"></i>Unprofessional</span>'
                       : '<span class="badge badge-muted" style="font-size:9px">Neutral</span>';

  const commentsHtml = comments.length ? comments.map(cm=>{
    const flag = cm.flagReason ? `<div style="font-size:11px;color:var(--c-amber-fg);margin-top:6px;padding:6px 10px;background:var(--c-amber-bg);border-radius:var(--radius-sm);display:flex;align-items:flex-start;gap:6px"><i class="fa-light fa-flag" style="margin-top:2px"></i><div><strong>Flag:</strong> ${escapeHtml(cm.flagReason)}</div></div>` : '';
    return `<div style="padding:14px 16px;border-bottom:1px solid var(--border);background:${cm.hidden?'var(--muted)':'white'};opacity:${cm.hidden?'0.65':'1'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          ${sentBadge(cm.sentiment)}
          <span class="badge badge-outline" style="font-size:9px">${cm.sectionRef==='course'?'Course content':cm.sectionRef==='tier-2'?'Course director':'Faculty'}</span>
          ${cm.hidden?'<span class="badge badge-muted" style="font-size:9px"><i class="fa-light fa-eye-slash"></i>Hidden from faculty</span>':''}
        </div>
        <button class="btn btn-${cm.hidden?'outline':'amber-outline'} btn-xs" onclick="toggleCommentHidden('${c.id}','${cm.id}')"><i class="fa-light ${cm.hidden?'fa-rotate-left':'fa-eye-slash'}"></i>${cm.hidden?'Restore':'Hide'}</button>
      </div>
      <div style="font-size:13px;color:${cm.hidden?'var(--muted-fg)':'var(--foreground)'};line-height:1.55;${cm.hidden?'text-decoration:line-through':''}">"${escapeHtml(cm.text)}"</div>
      ${flag}
    </div>`;
  }).join('') : '<div class="empty">No open-text comments to moderate.</div>';

  return `
    <div class="card" style="margin-bottom:18px;border:1.5px solid color-mix(in oklch, var(--c-amber) 30%, white);background:linear-gradient(180deg, var(--c-amber-bg) 0%, white 100%)">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--c-amber-bg);color:var(--c-amber-fg);display:flex;align-items:center;justify-content:center;font-size:16px"><i class="fa-light fa-shield-halved"></i></div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700;color:var(--c-amber-fg)">Pending admin review</div>
          <div style="font-size:11px;color:var(--c-amber-fg);margin-top:2px;line-height:1.5">${c.code} survey closed. Two gates before faculty results unlock: <strong>(1)</strong> grades posted to SIS (FR-06 grade-lock), <strong>(2)</strong> admin moderates comments.</div>
        </div>
      </div>

      <div style="background:white;border-radius:var(--radius-sm);padding:8px 14px 4px;margin-bottom:14px">
        ${stepHtml('1','Grades posted to SIS','Faculty must finalize grades. Until then, results stay locked even after moderation.', gradeReady, !gradeReady)}
        ${stepHtml('2','Comments moderated','Hide unprofessional or out-of-scope comments. Scores cannot be edited (FR per VB).', false, gradeReady)}
        ${stepHtml('3','Publish results','Releases visible comments + scores to faculty. Cannot be undone.', false, gradeReady && false)}
      </div>

      <div class="dash-grid" style="gap:14px;margin-bottom:0">
        <div class="card card-flush" style="grid-column:1 / -1;background:white">
          <div class="card-section" style="display:flex;align-items:center;justify-content:space-between">
            <div>
              <div class="card-title"><i class="fa-light fa-comments"></i>Open-text comments (${comments.length})</div>
              <div class="card-sub">${visibleCount} visible to faculty · ${hiddenCount} hidden${flaggedCount?' · '+flaggedCount+' flagged':''}</div>
            </div>
            ${gradeReady ? `<button class="btn btn-primary btn-sm" onclick="publishResults('${c.id}')"><i class="fa-light fa-paper-plane"></i>Publish results to faculty</button>` : `<button class="btn btn-outline btn-sm" disabled title="Grades not yet posted"><i class="fa-light fa-lock"></i>Publish blocked: grades pending</button>`}
          </div>
          ${commentsHtml}
        </div>
      </div>
    </div>
  `;
}

function publishResults(cid){
  const c = courseOf(cid); if(!c) return;
  if(!c.gradesPosted){
    toast(`${c.code}: confirm grades posted to SIS first (FR-06 grade-lock).`, 'warning');
    return;
  }
  c.surveyStatus = 'results-available';
  c.publishedAt = new Date().toISOString();
  state.activity.unshift({when:new Date().toISOString(), text:`Results <strong>published</strong> for ${c.code} after admin review. Faculty notified.`});
  renderAll();
  toast(`${c.code}: results published to faculty.`,'success');
}
function addResponse(cid){
  const c = courseOf(cid); if(!c) return;
  if(c.completion >= 95){ toast('Survey already at high completion','info'); return; }
  c.completion = Math.min(95, c.completion + Math.round(100/c.enrolled));
  renderAll();
  toast(`${c.code}: simulated +1 response. Completion now ${c.completion}%.`,'success');
}

/* Drill-in modal for question distribution */
function openQuestionDrill(courseId, questionIdx){

  const total = q.dist.reduce((a,b)=>a+b,0);

  const t = typeOf(c.typeId);

  /* Per-question themes are derived: pick any course theme as illustrative */
  const themes = (COURSE_THEMES[c.id]||[]).slice(0,2);
  const distHtml = [5,4,3,2,1].map(s=>{

            <div style="font-size:28px;font-weight:700;line-height:1">${q.avg.toFixed(2)}<span style="font-size:13px;color:var(--muted-fg);font-weight:500">/ 5.0</span></div>
            <div style="font-size:11px;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.06em;margin-top:4px">Average</div>
            <div style="margin-top:10px;font-size:11px;color:var(--muted-fg);line-height:1.5">${q.avg>=4.3?'<i class="fa-light fa-thumbs-up" style="color:var(--c-green-fg);margin-right:4px"></i>Strong, no action needed':q.avg>=3.7?'<i class="fa-light fa-circle-check" style="color:var(--brand-color);margin-right:4px"></i>Acceptable, monitor over time':'<i class="fa-light fa-triangle-exclamation" style="color:var(--c-amber-fg);margin-right:4px"></i>Below 3.7, consider redesign'}</div>

/* Drill-in modal for a theme: shows all quotes + which courses */
function openThemeDrill(courseId, themeIdx){
  const c = courseOf(courseId);

function showModal({title, body, actions, size}){
  const modal = document.getElementById('modal');
  modal.className = 'modal' + (size?' '+size:'');
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-foot').innerHTML = actions || '';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function toast(msg, kind){
  const host = document.getElementById('banner-host');
  const div = document.createElement('div');
  div.className = 'sys-banner ' + (kind||'info');
  const icon = kind==='success'?'fa-circle-check':kind==='warning'?'fa-triangle-exclamation':kind==='info'?'fa-circle-info':'fa-circle-info';
  div.innerHTML = `<i class="fa-light ${icon}"></i><span style="flex:1">${msg}</span><button class="sys-banner-close" aria-label="Dismiss"><i class="fa-light fa-xmark"></i></button>`;
  div.querySelector('.sys-banner-close').onclick = ()=>div.remove();
  host.appendChild(div);
  setTimeout(()=>div.remove(), 4500);
}

/* ════════════════════════════════════════════════════════════════════
   CURRICULUM COMMITTEE CHAIR
   Reads aggregate course data; never sees individual faculty scores
   ════════════════════════════════════════════════════════════════════ */
function renderCCC(){
  if(state.surveyDetailId && state.surveyDetailFromPersona==='ccc') return renderSurveyDetail();
  if(state.cccView==='competency') return renderCccCompetency();
  if(state.cccView==='themes')     return renderCccThemes();
  return renderCccTrends();
}

function buildCourseHistory(courseCode, terms){
  /* Pull avg scores for a course code across multiple terms (current + synthetic prior) */
  const cur = COURSES.find(c=>c.code===courseCode && c.termId===state.termId);
  if(!cur) return null;
  const target = cur.avg, prev = cur.prev || target;
  const drift = (target - prev) * 0.5;
  return [
    {term:'Sp 23', score:+(prev - drift*1.5).toFixed(2)},
    {term:'Fa 23', score:+(prev - drift*0.7).toFixed(2)},
    {term:'Sp 24', score:+prev.toFixed(2)},
    {term:'Fa 24', score:+((prev+target)/2).toFixed(2)},
    {term:'Sp 25', score:+target.toFixed(2)},
  ];
}

function renderCccTrends(){
  const released = COURSES.filter(c=>c.termId===state.termId && c.avg!==null && !c.minNFail);
  /* Sort by largest negative trend (most concerning) */
  const enriched = released.map(c=>{
    const hist = buildCourseHistory(c.code);
    if(!hist) return null;
    const slope = hist[4].score - hist[0].score;
    return {course:c, hist, slope};
  }).filter(Boolean).sort((a,b)=>a.slope-b.slope);

  const rows = enriched.map(({course:c, hist, slope})=>{
    const t = typeOf(c.typeId);
    const sparkline = renderSparkline(hist.map(h=>h.score));
    const slopeBadge = slope <= -0.3 ? '<span class="badge badge-danger" title="Declining trend">Declining</span>' :
                       slope <= -0.1 ? '<span class="badge badge-warn" title="Slight decline">Slight decline</span>' :
                       slope >=  0.3 ? '<span class="badge badge-success" title="Improving trend">Improving</span>' :
                                       '<span class="badge badge-muted">Stable</span>';
    return `<tr class="mon-tr" style="cursor:pointer" onclick="openSurveyDetail('${c.id}','ccc')">
      <td class="mon-td"><strong>${c.code}</strong><div style="font-size:11px;color:var(--muted-fg)">${escapeHtml(c.name)}</div></td>
      <td class="mon-td"><span class="badge ${t.badge}">${t.name}</span></td>
      ${hist.map(h=>`<td class="mon-td" style="text-align:center;font-size:12px;color:${h.score<3.7?'var(--c-amber-fg)':'var(--foreground)'};font-weight:${h.score<3.7?'700':'500'}">${h.score.toFixed(1)}</td>`).join('')}
      <td class="mon-td">${sparkline}</td>
      <td class="mon-td">${slopeBadge}</td>
    </tr>`;
  }).join('');

  const concerning = enriched.filter(e=>e.slope<=-0.3).length;

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Multi-cohort trends</div>
        <div class="page-subtitle">Course-level evaluation scores across 5 terms. Same standardized question banks throughout, so trends are directly comparable. Aggregate course data only: individual faculty scores are not visible to this role.</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-outline btn-sm" onclick="exportCccTrends()"><i class="fa-light fa-arrow-down-to-line"></i>Export trend data</button>
      </div>
    </div>
    <div class="kpi-grid" style="grid-template-columns:repeat(3, 1fr)">
      <div class="kpi"><div class="kpi-label">Courses tracked</div><div class="kpi-val">${enriched.length}</div><div class="kpi-meta">across 5 terms</div></div>

function renderSparkline(values){
  const W=80, H=24;
  const min=2.5, max=5.0;
  const xs = values.map((_,i)=>4 + i*((W-8)/(values.length-1)));
  const ys = values.map(v => H-3 - ((v-min)/(max-min))*(H-6));
  const d = xs.map((x,i)=>`${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const trendColor = values[values.length-1]>=values[0] ? 'oklch(0.45 0.14 155)' : 'oklch(0.52 0.16 55)';
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><path d="${d}" fill="none" stroke="${trendColor}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>${values.map((v,i)=>`<circle cx="${xs[i]}" cy="${ys[i]}" r="1.5" fill="${trendColor}"/>`).join('')}</svg>`;
}

function exportCccTrends(){
  const released = COURSES.filter(c=>c.termId===state.termId && c.avg!==null);
  const rows = [['Course','Type','Sp 23','Fa 23','Sp 24','Fa 24','Sp 25','Slope','Pattern']];
  released.forEach(c=>{
    const hist = buildCourseHistory(c.code);
    if(!hist) return;
    const slope = +(hist[4].score-hist[0].score).toFixed(2);
    const pat = slope<=-0.3?'Declining':slope<=-0.1?'Slight decline':slope>=0.3?'Improving':'Stable';
    rows.push([c.code, typeOf(c.typeId).name, ...hist.map(h=>h.score), slope, pat]);
  });
  const csv = rows.map(r=>r.map(v=>{const s=String(v||'');return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`pce-curriculum-trends-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('Curriculum trend data exported.','success');
}

  const matrixRows = filtered.map(comp=>{
    const courses = released.filter(c=>(COURSE_COMPETENCIES[c.id]||[]).includes(comp.id));

function renderCccThemes(){
  /* Cluster themes across courses */
  const all = [];
  Object.entries(COURSE_THEMES).forEach(([cid, themes])=>{
    const c = courseOf(cid);
    if(!c || c.termId!==state.termId) return;
    themes.forEach((t,idx)=>all.push({...t, courseId:c.id, themeIdx:idx, courseCode:c.code, courseName:c.name, courseType:typeOf(c.typeId).name}));
  });
  /* Group by sentiment */
  const positives = all.filter(t=>t.sentiment==='positive').sort((a,b)=>b.mentions-a.mentions);
  const concerns = all.filter(t=>t.sentiment==='concern').sort((a,b)=>b.mentions-a.mentions);

  const renderThemeList = list => list.length ? list.map(t=>`
    <div style="padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--tr)" onmouseover="this.style.background='var(--muted)'" onmouseout="this.style.background='transparent'" onclick="openThemeDrill('${t.courseId}',${t.themeIdx})">
      <div style="display:flex;justify-content:space-between;align-items:center"><strong style="font-size:13px">${escapeHtml(t.name)}</strong><span style="font-size:11px;color:var(--muted-fg)">${t.mentions} mentions <i class="fa-light fa-chevron-right" style="margin-left:4px"></i></span></div>
      <div style="font-size:11px;color:var(--muted-fg);margin-top:4px"><strong>${t.courseCode}</strong> · ${escapeHtml(t.courseName)} · ${t.courseType}</div>
      <div style="font-size:12px;color:var(--muted-fg);font-style:italic;margin-top:7px;line-height:1.55">"${escapeHtml(t.quotes[0])}"</div>
    </div>
  `).join('') : '<div class="empty">No themes detected.</div>';

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Cross-course themes</div>
        <div class="page-subtitle">Patterns from open-text responses clustered across all released courses this term. Helps the committee identify program-wide strengths and curriculum-level concerns rather than course-specific issues.</div>

        <div class="card-section"><div class="card-title"><i class="fa-light fa-thumbs-up"></i>Positive themes (${positives.length})</div><div class="card-sub">What is working program-wide.</div></div>

        ${renderThemeList(concerns)}

    </div>
  `;
}

function exportFacultyDossier(fid){
  const f = FACULTY_ROSTER.find(x=>x.id===fid);
  const history = FACULTY_HISTORY[f.id] || [];
  const rows = [['Faculty Dossier', f.name, f.rank+' · '+f.department, 'Hired '+f.hireYear]];
  rows.push(['']);
  rows.push(['Term','Course','Score','N','Pattern']);
  history.forEach(h=>{
    const pat = h.score===null?'Suppressed (N<5)':h.score>=4.5?'Strong':h.score>=4.0?'Solid':h.score>=3.5?'Mixed':'Concern';
    rows.push([termOf(h.termId)?.name||h.termId, h.course, h.score===null?'Suppressed':h.score.toFixed(2), h.n, pat]);
  });
  const csv = rows.map(r=>r.map(v=>{const s=String(v||'');return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`pce-dossier-${f.name.replace(/\s+/g,'-').toLowerCase()}-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast(`${f.name} dossier exported.`,'success');
}

function renderDceClinical(){
  const clinicals = COURSES.filter(c=>c.termId===state.termId && c.typeId==='ct2');
  const released = clinicals.filter(c=>c.surveyStatus==='results-available' && c.avg!==null);
  const programAvg = released.length ? +(released.reduce((a,c)=>a+c.avg,0)/released.length).toFixed(2) : null;

  const rows = clinicals.map(c=>{
    const responded = responseCount(c.id);
    const isReleased = c.surveyStatus==='results-available' && c.avg!==null;
    const scoreCell = isReleased
      ? `<div class="mon-bar"><div class="mon-bar-track"><div class="mon-bar-fill" style="width:${c.avg/5*100}%"></div></div><span class="mon-bar-num">${c.avg.toFixed(2)}</span></div>`
      : `<span class="muted text-xs">${surveyStatusLabel(c.surveyStatus)}</span>`;
    return `<tr class="mon-tr" onclick="state.dceCourseId='${c.id}';setView('readiness')" style="cursor:pointer">
      <td class="mon-td"><strong>${c.code}</strong><div style="font-size:11px;color:var(--muted-fg)">${escapeHtml(c.name)}</div></td>
      <td class="mon-td">${escapeHtml(c.instructor)} <span class="muted text-xs">(coordinator)</span></td>
      <td class="mon-td">${responded}/${c.enrolled} (${c.completion}%)</td>
      <td class="mon-td">${scoreCell}</td>
      <td class="mon-td">${isReleased?trendArrowFac(c.avg, c.prev):''}</td>
    </tr>`;
  }).join('');

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Clinical course dashboard</div>
        <div class="page-subtitle">Aggregate evaluation results for all clinical rotations this term. Per Phase 1 scope, course coordinator (DCE) evaluation is included; preceptor and site evaluations are handled in Learning Activities, not here.</div>
      </div>
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(3, 1fr)">
      <div class="kpi"><div class="kpi-label">Clinical courses</div><div class="kpi-val">${clinicals.length}</div><div class="kpi-meta">${released.length} released</div></div>
      <div class="kpi"><div class="kpi-label">Clinical avg</div><div class="kpi-val">${programAvg===null?'--':programAvg.toFixed(2)}<small>/ 5.0</small></div><div class="kpi-meta">Across released rotations</div></div>
      <div class="kpi"><div class="kpi-label">Coordinator (you)</div><div class="kpi-val" style="font-size:18px">CLIN 302</div><div class="kpi-meta">Your course as DCE</div></div>
    </div>

    <table class="mon-table">
      <thead><tr>
        <th class="mon-th">Course</th><th class="mon-th">Coordinator</th><th class="mon-th">Completion</th><th class="mon-th">Score</th><th class="mon-th">vs Last</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>

    <div class="card" style="margin-top:14px">
      <div class="card-head">
        <div>
          <div class="card-title"><i class="fa-light fa-circle-info"></i>Why this is separate from preceptor evaluation</div>
        </div>
      </div>
      <div style="font-size:13px;color:var(--muted-fg);line-height:1.65">
        PCE captures student feedback on the clinical course as a whole and on the course coordinator role. Per-preceptor and per-site feedback is collected in Learning Activities, where it can be tied to placement-specific context (clinical hours, supervisor identity, site demographics). Combining the two streams is a Phase 2 cohort-correlation goal.
      </div>
    </div>
  `;
}

function renderDceReadiness(){
  const c = courseOf(state.dceCourseId) || COURSES.find(x=>x.typeId==='ct2'&&x.termId===state.termId);
  const clinicals = COURSES.filter(co=>co.termId===state.termId && co.typeId==='ct2' && co.surveyStatus==='results-available' && co.avg!==null);
  const themes = COURSE_THEMES[c.id] || [];
  const concerns = themes.filter(t=>t.sentiment==='concern');

  const facets = [
    {label:'Patient exposure', score: c.avg ? +(c.avg+0.1).toFixed(2) : null, weight:'High'},
    {label:'Application of didactics', score: c.avg ? +(c.avg-0.05).toFixed(2) : null, weight:'High'},
    {label:'Site organization', score: c.avg ? +(c.avg-0.2).toFixed(2) : null, weight:'Medium'},
    {label:'Supervision adequacy', score: c.avg ? +(c.avg-0.1).toFixed(2) : null, weight:'High'},
    {label:'Overall satisfaction', score: c.avg, weight:'High'},
  ];
  const readinessSignal = c.avg===null?'Pending':c.avg>=4.3?'Strong':c.avg>=3.8?'Adequate':'Risk';

  return `
    <div class="page-header">
      <div>
        <a class="btn btn-link" onclick="setView('clinical')"><i class="fa-light fa-arrow-left"></i>Back to clinical dashboard</a>
        <div class="page-title" style="margin-top:6px">${c.code}: ${escapeHtml(c.name)}</div>
        <div class="page-subtitle">Cohort readiness signals from rotation evaluation. Helps you triage which placements to revisit before next cohort.</div>
      </div>
      <div class="page-actions">
        <select class="select" style="width:auto" onchange="state.dceCourseId=this.value;renderAll()">${clinicals.map(co=>`<option value="${co.id}" ${co.id===c.id?'selected':''}>${co.code}: ${co.name}</option>`).join('')}</select>
      </div>
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(4, 1fr)">
      <div class="kpi"><div class="kpi-label">Cohort readiness</div><div class="kpi-val" style="font-size:18px;color:${readinessSignal==='Strong'?'var(--c-green-fg)':readinessSignal==='Risk'?'oklch(0.42 0.16 55)':'var(--c-amber-fg)'}">${readinessSignal}</div><div class="kpi-meta">Composite signal</div></div>
      <div class="kpi"><div class="kpi-label">Avg score</div><div class="kpi-val">${c.avg===null?'--':c.avg.toFixed(2)}<small>/ 5.0</small></div><div class="kpi-meta">${trendArrowFac(c.avg, c.prev)}</div></div>
      <div class="kpi"><div class="kpi-label">Responses</div><div class="kpi-val">${responseCount(c.id)}<small>/${c.enrolled}</small></div></div>
      <div class="kpi"><div class="kpi-label">Concerns flagged</div><div class="kpi-val">${concerns.length}</div><div class="kpi-meta">From open-text themes</div></div>
    </div>

    <div class="dash-grid">
      <div class="card">
        <div class="card-head"><div><div class="card-title"><i class="fa-light fa-list-check"></i>Readiness facets</div><div class="card-sub">Weighted facets contributing to the overall readiness signal. Click any to see the source question.</div></div></div>
        <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:10px">
          <div style="flex-shrink:0">${chartRadar(facets)}</div>
          <div style="flex:1;font-size:11px;color:var(--muted-fg);line-height:1.6;align-self:center">Larger area = stronger cohort readiness. Notches inside the inner ring (below 3.5) are facets to revisit before next cohort.</div>
        </div>
        ${facets.map((fc,fi)=>`
          <div style="display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--tr);margin:0 -8px;padding-left:8px;padding-right:8px;border-radius:var(--radius-sm)" onmouseover="this.style.background='var(--muted)'" onmouseout="this.style.background='transparent'" onclick="openDceFacetDrill('${c.id}',${fi})">
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600">${fc.label}</div>
              <div style="font-size:11px;color:var(--muted-fg)">Weight: ${fc.weight}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;width:160px">
              <div style="flex:1;height:5px;background:var(--muted-2);border-radius:99px;overflow:hidden"><div style="height:100%;width:${fc.score?fc.score/5*100:0}%;background:${fc.score>=4.0?'var(--c-green)':fc.score>=3.5?'var(--c-amber)':'oklch(0.52 0.16 55)'};border-radius:99px"></div></div>
              <span style="font-size:13px;font-weight:600;width:34px;text-align:right">${fc.score?fc.score.toFixed(2):'--'}</span>
            </div>
            <i class="fa-light fa-chevron-right" style="color:var(--muted-fg);font-size:11px"></i>
          </div>
        `).join('')}
      </div>

      <div class="card card-flush">
        <div class="card-section"><div class="card-title"><i class="fa-light fa-circle-exclamation"></i>Site-level concerns</div><div class="card-sub">Themes from open-text suggesting placement-specific issues to revisit.</div></div>
        ${concerns.length ? concerns.map((t,ti)=>{
          const fullIdx = themes.findIndex(th=>th.name===t.name);
          return `<div style="padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--tr)" onmouseover="this.style.background='var(--muted)'" onmouseout="this.style.background='transparent'" onclick="openThemeDrill('${c.id}',${fullIdx})">
            <div style="display:flex;justify-content:space-between;align-items:center"><strong style="font-size:13px">${escapeHtml(t.name)}</strong><i class="fa-light fa-chevron-right" style="color:var(--muted-fg);font-size:11px"></i></div>
            <div style="font-size:11px;color:var(--muted-fg);margin-top:3px">${t.mentions} mentions <span style="margin-left:6px;color:var(--brand-color)">See all quotes</span></div>
            <div style="font-size:12px;color:var(--muted-fg);font-style:italic;margin-top:7px">"${escapeHtml(t.quotes[0])}"</div>
          </div>`;
        }).join('') : `<div style="padding:24px;text-align:center"><div style="font-size:24px;color:var(--c-green-fg);margin-bottom:8px"><i class="fa-light fa-circle-check"></i></div><div style="font-size:13px;color:var(--c-green-fg);font-weight:600">No site-level concerns this term</div><div style="font-size:12px;color:var(--muted-fg);margin-top:6px;line-height:1.55">Open-text responses for ${c.code} did not surface placement-specific issues. Continue current site arrangements.</div></div>`}
      </div>
    </div>
  `;
}

        </div>

    </div>

/* INIT */
/* Deep-link from the storyboard landing: read URL fragment for persona+view */
(function applyDeepLink(){
  const h = (location.hash||'').replace(/^#/,'');
  if(!h) return;
  const params = Object.fromEntries(h.split('&').map(p=>p.split('=').map(decodeURIComponent)));
  if(params.persona && PERSONAS[params.persona]) state.persona = params.persona;
  if(state.persona==='pd' && params.view) state.pdView = params.view;
  if(state.persona==='coord' && params.view) state.coordView = params.view;
  if(state.persona==='fac' && params.view) state.facView = params.view;
  if(state.persona==='stu' && params.view) state.stuView = params.view;
  if(state.persona==='ccc' && params.view) state.cccView = params.view;
  if(state.persona==='chair' && params.view) state.chairView = params.view;
  if(state.persona==='dce' && params.view) state.dceView = params.view;
  if(params.tab && state.persona==='pd' && state.pdView==='setup') state.pdSetupTab = params.tab;
  if(params.wizardStep) state.wizardStep = parseInt(params.wizardStep);
  if(params.surveyDetail){ state.surveyDetailId = params.surveyDetail; state.surveyDetailFromPersona = state.persona; }
  if(params.facCourse) state.facCourseId = params.facCourse;
  if(params.stuCourse){ state.stuCourseId = params.stuCourse; state.stuView='survey'; state.stuSection=0; }
})();
renderAll();
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeModal(); state.demoOpen=false; renderDemoPanel(); }});

</script>
