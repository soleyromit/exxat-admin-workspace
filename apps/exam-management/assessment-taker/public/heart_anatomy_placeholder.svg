<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="400" height="340" fill="#f8f9fa" rx="8"/>

  <!-- Heart silhouette -->
  <path d="M200 280 C100 200 40 160 40 100 C40 60 75 35 110 35 C140 35 165 52 180 70 C185 76 192 82 200 82 C208 82 215 76 220 70 C235 52 260 35 290 35 C325 35 360 60 360 100 C360 160 300 200 200 280Z"
    fill="#ffe0e0" stroke="#c0392b" stroke-width="2"/>

  <!-- Aorta -->
  <path d="M185 82 L175 40 C175 30 185 22 195 22 L215 22 C225 22 230 30 225 40 L210 82"
    fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>

  <!-- Pulmonary artery -->
  <path d="M205 85 L200 55 C200 45 210 38 220 42 L255 55 C265 60 265 72 255 75 L215 88"
    fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>

  <!-- Left ventricle -->
  <ellipse cx="170" cy="175" rx="45" ry="60" fill="#ffb3b3" stroke="#c0392b" stroke-width="1.5"/>

  <!-- Right ventricle -->
  <ellipse cx="230" cy="175" rx="45" ry="60" fill="#aed6f1" stroke="#2980b9" stroke-width="1.5"/>

  <!-- Septum line -->
  <line x1="200" y1="115" x2="200" y2="240" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Labels -->
  <text x="108" y="98" font-size="11" fill="#555" text-anchor="middle">Right</text>
  <text x="108" y="111" font-size="11" fill="#555" text-anchor="middle">Atrium</text>

  <text x="292" y="98" font-size="11" fill="#555" text-anchor="middle">Left</text>
  <text x="292" y="111" font-size="11" fill="#555" text-anchor="middle">Atrium</text>

  <text x="160" y="182" font-size="11" fill="#7f8c8d" text-anchor="middle">Right</text>
  <text x="160" y="196" font-size="11" fill="#7f8c8d" text-anchor="middle">Ventricle</text>

  <text x="240" y="182" font-size="11" fill="#7f8c8d" text-anchor="middle">Left</text>
  <text x="240" y="196" font-size="11" fill="#7f8c8d" text-anchor="middle">Ventricle</text>

  <text x="192" y="17" font-size="10" fill="#555" text-anchor="middle">Aorta</text>
  <text x="248" y="36" font-size="10" fill="#2980b9" text-anchor="start">Pulmonary A.</text>

  <!-- Caption -->
  <text x="200" y="320" font-size="11" fill="#888" text-anchor="middle">Heart Anatomy — Reference Diagram</text>
</svg>
